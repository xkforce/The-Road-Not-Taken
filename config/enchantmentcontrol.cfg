# Configuration file

general {
    # Each line is a group of mutually exclusive enchantments
    #   like Smite, Sharpness and BoA
    # Can be auto filled using "First Setup.Print Default Incompatibilities"
    # Warning: this mod takes full control of enchantments incompatibilities with each other
    #   so run the first setup every time you add mods that have enchants, then compare with what you set up to stay up to date
    S:"Incompatible Groups" <
        minecraft:feather_falling, nee:strengthenedvitality
        minecraft:feather_falling, nee:curseofvulnerability
        minecraft:feather_falling, nyx:lunar_shield
        minecraft:fire_aspect, minecraft:thorns
        crossbows:multishot, crossbows:piercing
        minecraft:efficiency, minecraft:knockback
        minecraft:efficiency, minecraft:fire_aspect
        minecraft:fire_aspect, nee:freezing
        nee:swordmastery, minecraft:sweeping
        minecraft:efficiency, enchanting_tweaks:momentum
        minecraft:silk_touch, nee:smelter
        minecraft:silk_touch, cofhcore:insight
        minecraft:silk_touch, cofhcore:smashing
        minecraft:silk_touch, enchanting_tweaks:item_link
        minecraft:silk_touch, cofhcore:smelting
        minecraft:silk_touch, minecraft:luck_of_the_sea
        nee:instability, minecraft:unbreaking
        nee:freezing, nee:hors_de_combat
        minecraft:power, enchanting_tweaks:grounding
        minecraft:infinity, randomenchantments:piercing
        minecraft:infinity, minecraft:mending
        minecraft:infinity, randomenchantments:back_to_the_chamber
        minecraft:infinity, randomenchantments:exploding
        nee:freezing, nee:fieryshield
        nee:curseofinaccuracy, nee:truestrike
        minecraft:vanishing_curse, cofhcore:soulbound
        oe:is_watermob, oe:is_wet
        minecraft:depth_strider, minecraft:frost_walker, lava_walker:lava_walker
        minecraft:silk_touch, minecraft:fortune, minecraft:looting
        minecraft:silk_touch, enchanting_tweaks:destruction_curse, minecraft:fortune
        nee:instability, nee:cursededge, nee:luckmagnification
        nee:cursededge, nee:difficultyscaled, nee:luckmagnification
        minecraft:smite, minecraft:bane_of_arthropods, deeperdepths:density, deeperdepths:breach
        minecraft:sharpness, minecraft:smite, minecraft:bane_of_arthropods, nyx:lunar_edge
        minecraft:protection, minecraft:fire_protection, minecraft:blast_protection, minecraft:projectile_protection, nee:strengthenedvitality
        minecraft:protection, minecraft:fire_protection, minecraft:blast_protection, minecraft:projectile_protection, nee:curseofvulnerability
        minecraft:protection, minecraft:fire_protection, minecraft:blast_protection, minecraft:projectile_protection, nyx:lunar_shield
        nee:mathematics, nee:science, nee:history, nee:english, nee:pe
     >

    # Global Toggle to disable the entire Incompatible groups override
    B:"Incompatible Groups Enabled"=true

    ##########################################################################################################
    # first setup
    #--------------------------------------------------------------------------------------------------------#
    # If you're a modpack dev just starting to set up this mod, you probably want to start here.
    ##########################################################################################################

    "first setup" {
        # Enable if you want to remap enchantment ids. Warning: See Warning in "Enchantment Id Remaps"
        B:"(MixinToggle) Enable Registry Remapping"=false

        # !Disables itself after a one time use!
        # 
        # If enabled, during startup this mod will check all present incompatibilities between enchantments and print them out into the "Incompatible Enchantment Groups" config.
        # Config will look correct after restart.
        # This is done because this mod fully overwrites enchantment incompatibility, so this step should be re-done every time a new mod with enchantments is added to a modpack, to keep its inherent incompats.
        # 
        # WARNING: this will overwrite your current "Incompatible Groups" setup on restart!
        B:"Print Default Incompatibilities"=false

        # !Disables itself after a one time use!
        # 
        # If enabled, during startup this mod will check what items every enchant allows using their type and print the result out into the two "Item Types" configs.
        # Config will look correct after restart.
        # This mod overrides the default type system, so removing an enchant from the "Item Types" lists will actually disallow it, except if there is allowed custom overriding code interfering.
        # Note: this system tries to be intelligent and helpful and infers a bit more info than it needs to (example: anvil section could be empty as that's all fully custom behavior, so removing these entries wont do anything).
        # It is not able to find and translate every single modded behavior, and might even mistranslate rare modded application rules.
        # So if you want full control ("Allow Modded Enchantment Behaviors .." = false) you will have to figure out those rules and translate them to custom item types yourself.
        # This step should be re-done every time a new mod with enchantments is added to a modpack, to keep its inherent types.
        # 
        # WARNING: enabling this will overwrite your current "Item Types" setup on restart!
        B:"Print Default Item Types"=false

        # !Disables itself after a one time use!
        # 
        # If enabled, during startup this mod will infer info about all registered enchantments and print them out in /config/enchantmentcontrol/inferred-inactive/.
        # The created json files can be used as blueprints from which to work off of.
        # To do so, copy everything to /config/enchantmentcontrol/enchantments/, then delete every file + line in file that should stay default/untouched.
        # DEBUG: These can also be used to check if the changes you apply to the enchantments are actually applied, which would reflect in the inferred files (except "types")
        # WARNING: All files in /inferred-inactive/ will be overwritten every time you start the game with this option enabled
        B:"Print Inferred Enchantment Infos"=false

        # Advanced
        # 
        # When inferring cfg jsons from existing enchants, enabling this will also infer info that is usually not interesting or otherwise problematic to modify.
        # This will additionally give info for
        #  - type - the rigid base type (EnumEnchantmentType) to check if the enchant can go on an item. Modifying this in tandem with the config lists isn't advised
        #  - slots - rarely used system in what slot an enchant has to be in to be used
        #  - minLvl - basically always 1
        #  - doublePrice - to modify librarian price doubling independent of treasure property
        #  - enchantability - to modify at which lvl which enchant is available on enchanting table and connected systems
        #  - isAllowedOnBooks - a vanilla property, only used specifically when enchanting books with lvls, where those disallowed will never be rolled
        # Every option that is not existing in a json will keep the enchantment unmodified there, so reduction is advised.
        B:"Print Inferred Expanded"=false

        ##########################################################################################################
        # enchantment id remaps
        #--------------------------------------------------------------------------------------------------------#
        # If you really dont like one mods enchantment id (modid:enchid), you can add it here with a second entry of what you want to call it instead (modid:enchid). 
        # WARNING: this will cause permanent id remapping issues for old worlds! Only do this for new worlds or before you release a modpack, if you really need to!
        # pattern: S:"modid:oldenchid"=modid:newenchid
        # Has Mixin Toggle "Enable Registry Remapping"
        ##########################################################################################################

        "enchantment id remaps" {
        }

    }

    ##########################################################################################################
    # rarities
    #--------------------------------------------------------------------------------------------------------#
    # Override vanilla rarity weights (COMMON = 10, UNCOMMON = 5, RARE = 2, VERY_RARE = 1)
    # or define your own rarities with their own weights here.
    # Pattern: I:YOUR_RARITY_NAME=weight
    # Example:
    #   I:COMMON=20
    #   I:UNCOMMON=10
    #   I:RARE=4
    #   I:VERY_RARE=2
    #   I:LEGENDARY=1
    ##########################################################################################################

    rarities {
    }

    ##########################################################################################################
    # blacklists
    #--------------------------------------------------------------------------------------------------------#
    # Option to blacklist enchants to appear from various sources (or entirely)
    ##########################################################################################################

    blacklists {
        # Enchanting table will not be able to generate enchantments in this list
        S:"Enchanting Table Blacklist" <
         >

        # Enchantment Table blacklist will be treated as a Whitelist
        B:"Enchantment Table Whitelist Toggle"=false

        # Loot enchanted with levels (enchant_with_levels) will not be able to generate enchantments in this list
        S:"Level Enchantment Blacklist" <
         >

        # Level Enchantment blacklist will be treated as a Whitelist
        B:"Level Enchantment Whitelist Toggle"=false

        # Librarians will not be able to generate enchantments in this list
        S:"Librarian Enchantment Blacklist" <
         >

        # Enchantment blacklist will be treated as a Whitelist
        B:"Librarian Enchantment Whitelist Toggle"=false

        # Fully random books (enchant_randomly) will not be able to generate enchantments in this list
        S:"Random Enchantment Blacklist" <
         >

        # Random Enchantment blacklist will be treated as a Whitelist
        B:"Random Enchantment Whitelist Toggle"=false

        # Enchants in this list will be prevented from being registered in the game. There will be no way to access them at all.
        S:"Registered Enchantment Blacklist" <
         >
    }

    ##########################################################################################################
    # item types
    #--------------------------------------------------------------------------------------------------------#
    # What enchantment goes on which item?
    ##########################################################################################################

    "item types" {
        # Allow creative mode to ignore the canApply-AtEnchTable check for items matching the enchantment in the ANVIL, the /enchant CMD, both or neither. 
        # Vanilla default: ANVIL
        # Set to ANVIL to disable mixin (requires restart)
        # Valid values:
        # BOTH
        # ANVIL
        # CMD
        # NONE
        S:"(MixinToggle) Creative Skips Item Check"=NONE

        # Some modded items only pretend to be a specific item type without actually being them (wolf armor being SWORD and ARMOR_FEET, better survival items being SWORD etc).
        # Enabling this toggle will make the given item type match those too.
        # Disabling will instead only look at the actual checks of each EnumEnchantmentType (like SWORD = has to be instanceof ItemSword) to match.
        # It is closer to an unmodified experience if you keep this enabled. Disable it if you want full control over what enchants go on which items using custom types.
        # DEV NOTE: this toggle decides whether CustomItem.canApplyAtEnchantingTable is checked
        B:"Allow Modded Item Behaviors"=true

        # Enchantments are allowed on items using matchers. Define custom matchers here.
        # Pattern: MatcherName, Type, Arguments
        # Available Types with Arguments:
        #   modid, somemodid
        #   regex, regexToMatchAgainstItemId
        #   items, minecraft:iron_sword, mymod:mysword, ...
        #   class, some.org.somemodid.item.ItemSpecialSword, ...
        # Where 
        # - class matches when item class extends the named item classes
        # - regex uses regular expressions and has to match the full modid:itemid
        # - and items is a list of item ids
        S:"Custom Item Types" <
         >

        # Enchantments listed here will run against what is set in "Allow Modded Item Behaviors":
        #  - If modded behaviors are generally allowed, items listed here will not have their modded behavior allowed
        #  - If modded behaviors are generally disallowed, items listed here will have their modded behavior be allowed anyway
        S:"Item Blacklist" <
         >

        # Global Toggle to disable the entire Item Types category
        B:"Modification Enabled"=true

        ##########################################################################################################
        # general
        #--------------------------------------------------------------------------------------------------------#
        # Whenever enchantments are checked against items to possibly apply the enchantment, the rules in here are checked, to a modifiably varying degree.
        ##########################################################################################################

        general {
            # Some modded enchantments come with additional item applicability rules (example: SME Rune Revival on all BREAKABLE except ARMOR). 
            # For such enchantments, enabling this toggle will prioritise these additional rules before (and possibly instead of) checking against the types defined in "Item Types".
            # Disabling will instead only use the config "Item Types" to match.
            # It is closer to an unmodified experience if you keep this enabled. Disable it if you want full control over what enchants go on which items using custom types.
            # Note: prioritising custom behavior also means that inverted types (!TYPE) won't be able to re-disallow items that were only allowed by such custom behavior
            # DEV NOTE: this toggle decides whether only CustomEnchantment.canApplyAtEnchantingTable is checked vs only against Item Types config
            B:"Allow Modded Enchantment Behaviors"=true

            # Enchantments listed here will run against what is set in "Allow Modded Enchantment Behaviors":
            #  - If modded behaviors are generally allowed, enchants listed here will not have their modded behavior allowed
            #  - If modded behaviors are generally disallowed, enchants listed here will have their modded behavior be allowed anyway
            S:Blacklist <
             >

            # (Custom) Item Type name and a list of enchantments that can go on items with this type
            #  Pattern: TYPE = modid:enchid, modid:enchid2, ...
            #  You can also invert item type matches by adding a "!" in front of the type name (first character)
            #  This will disallow any item that matches the given matcher from using the given enchantments (except if allowed custom behavior gets priority and overrides)
            S:"Item Types" <
                ALL = randomenchantments:eternal, nee:curseofpossession, nyx:magnetization, minecraft:vanishing_curse, cofhcore:holding, cofhcore:soulbound, randomenchantments:butterfingers, randomenchantments:resistance
                crossbow = crossbows:piercing, crossbows:quick_charge, crossbows:multishot
                BREAKABLE = minecraft:unbreaking, minecraft:mending, randomenchantments:solar, randomenchantments:breaking, randomenchantments:shadow, charm:curse_break, charm:salvage, enchanting_tweaks:area, enchanting_tweaks:spellproof, enchanting_tweaks:weightless, enchanting_tweaks:counterattack, enchanting_tweaks:fertilizer, enchanting_tweaks:regrowth
                pickaxe = randomenchantments:stonelover
                FISHING_ROD = minecraft:luck_of_the_sea, minecraft:lure, randomenchantments:grappling, randomenchantments:hooked, enchanting_tweaks:meat_hook, nyx:magnetization, nee:curseofpossession, minecraft:vanishing_curse, randomenchantments:butterfingers, randomenchantments:eternal, cofhcore:soulbound
                LOCK = locks:sturdy, locks:complexity, locks:shocking
                GRAPPLEENCHANTS_FEET = grapplemod:slidingenchantment, grapplemod:wallrunenchantment, grapplemod:doublejumpenchantment
                ANY = nee:curseofholding, nee:pandora
                Golden Apple = nee:rune_resurrection
                axe = randomenchantments:lumberjack
                SHIELD = nee:fieryshield, nee:naturalblocking, nyx:magnetization, nee:curseofpossession, minecraft:vanishing_curse, randomenchantments:butterfingers, randomenchantments:eternal, cofhcore:soulbound
                tools&weapons = randomenchantments:magnetic, randomenchantments:global_traveler
                ARMOR_CHEST = minecraft:thorns, nee:strengthenedvitality, nee:innerberserk, randomenchantments:deflect
                ANY_TYPE =
                NONE = nee:upgrade
                SHOVEL =
                HOE = nee:welltilled, nee:tillingpower, nyx:magnetization, nee:curseofpossession, minecraft:vanishing_curse, randomenchantments:butterfingers, randomenchantments:eternal, cofhcore:soulbound
                re_deep_pockets = radenchants:deep_pockets
                ARMOR_HEAD = minecraft:respiration, minecraft:aqua_affinity
                ARMOR = minecraft:protection, minecraft:fire_protection, minecraft:blast_protection, minecraft:projectile_protection, advancedrocketry:spacebreathing, nyx:lunar_shield, nee:curseofvulnerability, randomenchantments:eternal, nee:curseofpossession, minecraft:vanishing_curse, randomenchantments:butterfingers, cofhcore:soulbound, nyx:magnetization
                ARMOR_LEGS = nee:evasion, radenchants:deep_pockets, radenchants:pocket_dimension
                SWORD = minecraft:sharpness, minecraft:smite, minecraft:bane_of_arthropods, minecraft:knockback, minecraft:fire_aspect, minecraft:looting, minecraft:sweeping, ffenchants:vampiric, ffenchants:bloodlust, nyx:lunar_edge, nyx:magnetization, nee:cursededge, nee:curseofpossession, nee:curseofinaccuracy, minecraft:vanishing_curse, nee:luckmagnification, nee:instability, randomenchantments:butterfingers, randomenchantments:eternal, randomenchantments:true_lifesteal, cofhcore:leech, cofhcore:soulbound
                BOW = minecraft:power, minecraft:punch, minecraft:flame, minecraft:infinity, nee:splitshot, nee:curseofinaccuracy, nee:rune_armorpiercing, nee:pushing, randomenchantments:ricochet, randomenchantments:teleportation, randomenchantments:quickdraw, randomenchantments:exploding, randomenchantments:phasing, randomenchantments:shattering, randomenchantments:back_to_the_chamber, randomenchantments:harvesting, randomenchantments:true_shot, randomenchantments:torches, randomenchantments:piercing, randomenchantments:homing, randomenchantments:transposition, cofhcore:multishot, cyclicmagic:enchantment.multishot, cyclicmagic:enchantment.quickdraw, enchanting_tweaks:grounding, enchanting_tweaks:item_link, enchanting_tweaks:instability_curse, nyx:magnetization, nee:curseofpossession, minecraft:vanishing_curse, randomenchantments:butterfingers, randomenchantments:eternal, randomenchantments:true_lifesteal, cofhcore:soulbound
                re_pocket_dimension = radenchants:pocket_dimension
                AXE = nee:disarmament, nee:brutality, nee:curseofinaccuracy, nee:luckmagnification, minecraft:sharpness, minecraft:smite, minecraft:bane_of_arthropods, minecraft:knockback, minecraft:fire_aspect, minecraft:looting, nyx:magnetization, minecraft:efficiency, minecraft:silk_touch, minecraft:fortune, nee:curseofpossession, minecraft:vanishing_curse, nee:instability, nee:smelter, randomenchantments:lumberjack, randomenchantments:fumbling, randomenchantments:butterfingers, randomenchantments:eternal, cofhcore:leech, cofhcore:soulbound, cyclicmagic:enchantment.magnet, cyclicmagic:enchantment.expboost, enchanting_tweaks:momentum, enchanting_tweaks:magnetism, enchanting_tweaks:reach, enchanting_tweaks:destruction_curse
                ARMOR_FEET = minecraft:feather_falling, minecraft:depth_strider, minecraft:frost_walker, nb:soul_speed, lava_walker:lava_walker, nee:lightweight, oe:mobstomp, oe:rebound, wornhorseshoes:trampling, grapplemod:wallrunenchantment, grapplemod:doublejumpenchantment, grapplemod:slidingenchantment
                shields = randomenchantments:reflect
                WEARABLE = minecraft:binding_curse
                PICKAXE =
                WEAPON = minecraft:smite, deeperdepths:wind_burst, nee:difficultyscaled, minecraft:sharpness, nee:science, nee:mathematics, nee:cursededge, deeperdepths:density, nee:hors_de_combat, nyx:lunar_edge, deeperdepths:breach, nee:luckmagnification, cofhcore:leech, nee:curseofinaccuracy, minecraft:fire_aspect, nee:pe, cofhcore:vorpal, oe:is_wet, nee:instability, nee:history, nee:ancientcurseinflicter, ffenchants:vampiric, nee:swordmastery, minecraft:sweeping, nee:truestrike, randomenchantments:swift, nee:freezing, ffenchants:bloodlust, nee:unsheathing, oe:loyalty, minecraft:bane_of_arthropods, minecraft:looting, nee:atomicdeconstructor, nee:frenzy, minecraft:knockback, nee:darkshadows, oe:is_watermob, nee:english
                weapons = randomenchantments:disarm, randomenchantments:floating, randomenchantments:true_lifesteal, randomenchantments:lightning, randomenchantments:instant_death, randomenchantments:paralysis, randomenchantments:cursed_jump
                DIGGER = randomenchantments:randomness, cofhcore:insight, enchanting_tweaks:momentum, enchanting_tweaks:magnetism, cyclicmagic:enchantment.magnet, minecraft:silk_touch, randomenchantments:stonebound, nee:instability, enchanting_tweaks:destruction_curse, randomenchantments:momentum, cyclicmagic:enchantment.expboost, nee:smelter, minecraft:efficiency, enchanting_tweaks:reach, randomenchantments:fumbling, randomenchantments:equal_mine, cofhcore:smashing, cofhcore:smelting, randomenchantments:obsidian_buster, minecraft:fortune
                TOOL = nyx:magnetization, minecraft:efficiency, minecraft:silk_touch, minecraft:fortune, nee:curseofpossession, minecraft:vanishing_curse, nee:instability, nee:smelter, randomenchantments:fumbling, randomenchantments:butterfingers, randomenchantments:eternal, cofhcore:soulbound, cyclicmagic:enchantment.magnet, cyclicmagic:enchantment.expboost, enchanting_tweaks:momentum, enchanting_tweaks:magnetism, enchanting_tweaks:reach, enchanting_tweaks:destruction_curse
             >

            # Global Toggle to disable the entire General Item Types category
            B:"Modification Enabled"=true
        }

        ##########################################################################################################
        # anvil
        #--------------------------------------------------------------------------------------------------------#
        # This is a vanilla override thats called when an enchantment is applied to an item using 
        #  - the anvil
        #  - or the /enchant command
        # (java internal: canApply)
        # The behavior in here is usually added on top of the general behavior, if modded enchantments don't change that up (and they are allowed to)
        ##########################################################################################################

        anvil {
            # Same as "General.Allow Modded Enchantment Behaviors" but specifically for anvil and /enchant command.
            # Overriding the canApply method is pretty common for mods, so allowing this is a good idea..
            #  Even vanilla does it, to
            #  - allow Sharpness, Smite & BoA on Axes
            #  - and to allow Thorns on all armor pieces, not just Chestplate
            # Disable this only if you want total control, then only the "Anvil.Item Types" are used, on top of whatever behavior happens in General
            # DEV NOTE: this toggle decides whether only CustomEnchantment.canApply is checked vs Item Types config || super.canApply
            B:"Allow Modded Enchantment Behaviors"=true

            # Enchantments listed here will run against what is set in "Allow Modded Enchantment Behaviors":
            #  - If modded behaviors are generally allowed, enchants listed here will not have their modded behavior allowed
            #  - If modded behaviors are generally disallowed, enchants listed here will have their modded behavior be allowed anyway
            S:Blacklist <
             >

            # (Custom) Item Type name and a list of enchantments that can go on items with this type when using the anvil (and the /enchant command), additionally to the "General.Item Types"
            #  Any type name from "General.Item Types" and "Custom Item Types" can be used here too, including inverted(!) ones.
            S:"Item Types" <
                ARMOR_HEAD = minecraft:thorns
                ARMOR = advancedrocketry:spacebreathing
                ARMOR_LEGS = minecraft:thorns
                SWORD = nee:difficultyscaled
                AXE = nyx:lunar_edge, nee:mathematics, nee:science, nee:history, nee:english, nee:pe
                HOE = minecraft:fortune
                ARMOR_FEET = minecraft:thorns
             >

            # Global Toggle to disable the entire Anvil-specific Item Types category
            B:"Modification Enabled"=true
        }

    }

    ##########################################################################################################
    # creature attributes
    #--------------------------------------------------------------------------------------------------------#
    # Define custom creature attributes and how to match them to entities.
    # Pattern: S:MY_ATTR_NAME=type, string1, string2, string3, ...
    # Available types: 
    #   modid: only check modid(s) 
    #   mob: check against 1 or more mob registry names 
    #   class: check if given class is in java class hierarchy of the mob
    # Examples:
    #   S:LYCANITE=modid, lycanitesmobs
    #   S:DRAGON=mob, minecraft:ender_dragon, iceandfire:firedragon, iceandfire:icedragon
    #   S:ANIMAL=class, net.minecraft.entity.EntityAgeable
    ##########################################################################################################

    "creature attributes" {
    }

    ##########################################################################################################
    # debug
    #--------------------------------------------------------------------------------------------------------#
    # Debug Options
    ##########################################################################################################

    debug {
        # Enchantment classes that should not be modified at all by this mod. 
        # Use this if there are crashes when this mod tries to automatically modify some mods enchantments. 
        # You can find the class name in config/enchantmentcontrol/tmp/enchclasses.dump
        # Class names noted here need to look like net.minecraft.enchantment.EnchantmentDamage
        # Vanilla enchants will always be targeted, so putting their classes in here won't do anything
        S:"Blacklisted Enchantment Classes" <
            com.github.mikn.lava_walker.asm.mixin.FrostWalkerEnchantmentMixin
         >

        # If enabled, using "Print Default Item Types" will also print all enchants and items that have custom behavior for general or anvil item application.
        #  Prints go to each blacklist. Will also automatically turn them into whitelists by untoggling "Allow Modded Behavior"
        # This option exists to make it easier for the few wanting full control over item types to see which enchantments have overriding behavior to account for
        B:"Print Item Type Blacklists"=false

        # If enabled, writes all currently loaded enchantment infos to /config/enchantmentcontrol/loaded/ during startup. Can be used to check if a given config json is actually loaded (and loaded correctly).
        B:"Print Loaded Enchantment Infos"=false
    }

    ##########################################################################################################
    # anvil mechanics
    #--------------------------------------------------------------------------------------------------------#
    # Options for Anvil Mechanics
    ##########################################################################################################

    "anvil mechanics" {
        # Main toggle for the Anvil Use Cost: Scaling Type, Combination Type and Scaling Factor in this config to be applicable
        B:"(MixinToggle) Change Cost Scaling"=false

        # Removes the "Too Expensive" system of anvils
        B:"(MixinToggle) Never Too Expensive"=false

        # If enabled, using the anvil on an item without modifying its enchantments (repair with item or material, renames) will not increase its anvil use cost
        B:"(MixinToggle) No Cost Increase On Repairs"=false

        # How the Anvil Use Cost of two items that are combined in the anvil get combined for the resulting item
        #   MAX: The default system. The resulting item will use the bigger anvil use cost of the two ingredient items (+1 use)
        #   SUM: Will add up the two items use cost (+1 use)
        #   AVERAGE: Will average the two items use cost (+1 use)
        #   MIN: Will take the smaller anvil use cost of the two ingredient items (+1 use). Probably not a great idea to use this one but who knows.
        # Note: This will also apply to the anvil use COUNT used to calc the anvil use COST
        # Valid values:
        # MIN
        # MAX
        # SUM
        # AVERAGE
        S:"Anvil Use Cost Combination Type"=MAX

        # Scaling factor "a" used in combination with the "Scaling Type" defined here.
        # Default is EXPONENTIAL with a factor of 2
        D:"Anvil Use Cost Scaling Factor"=2.0

        # How Anvil Use Cost ("RepairCost") scales with increased uses of the anvil
        # Available Types:
        #   EXPONENTIAL (a^n) - 1: Default system, possibly with modified scaling factor. Every use multiplies the current cost by the given factor (-1)
        #   QUADRATIC (a x n²): Less steep increase on more uses. With a factor of 1 it's similar to exponential but doesn't go as crazy for higher uses
        #   LINEAR (a x n): Slow increase. Every use adds the given factor to the current cost.
        #   CONST (a): No increase. Items that have been used in the anvil previously will have a fixed additional cost of the given factor. Items never used in the anvil before will have no additional cost.
        # In all of those, a is the "Scaling Factor" defined here and n is the current use count
        # Personal suggestion to use QUADRATIC with factor 1. Extremely close to default for anvil uses of 0-5, noticeably less crazy increase for higher uses
        # Default: 0, 1, 3, 7, 15, 31, 63, 127, 255, 512, 1023
        # Suggested quadratic: 0, 1, 4, 9, 16, 25, 36, 49, 64, 81, 100
        # Valid values:
        # EXPONENTIAL
        # QUADRATIC
        # LINEAR
        # CONST
        S:"Anvil Use Cost Scaling Type"=EXPONENTIAL

        ##########################################################################################################
        # blood anvil
        #--------------------------------------------------------------------------------------------------------#
        # Options for the Blood Anvil
        ##########################################################################################################

        "blood anvil" {
            # Allows to move enchants to an already enchanted item. 
            # If a moved enchant is already on the item, the one with the bigger level is kept, ignoring combination rules like 4+4=5
            B:"Allow Already Enchanted"=true

            # Allows to move enchants to a book or enchanted book
            B:"Allow Books"=false

            # If disabled, will clamp enchantment levels that are moved to their allowed range of levels
            # Note: if the target item already has an enchantment outside of its allowed range, this level will not be affected by the clamping.
            B:"Allow illegal levels"=false

            # If disabled, will check and filter for mutually exclusive enchantments on the original item.
            # Otherwise such illegal enchantment combinations would just be moved over to the target item.
            # Note: Enabling this will allow to *move existing* illegal enchantment combinations using the blood anvil.
            B:"Allow mutually exclusive original"=false

            # If disabled, will check and filter for mutually exclusive enchantments on the target item compared to the enchantments that are moved.
            # This option only has an effect if "Allow Already Enchanted" is enabled.
            # Note: Enabling this will allow to *create* illegal enchantment combinations using the blood anvil.
            B:"Allow mutually exclusive target"=false

            # If enabled, will not check for whether the moved enchants can actually go on the target item.
            # Note: Enabling this will allow all kinds of unintended item x enchantment combinations of which most will not do anything. Handle with care
            B:"Allow unapplicable"=false

            # If enabled, will combine the items repair costs too, the same way anvils do according to "Anvil Use Cost Combination Type", but without increasing the cost
            B:"Also move Repair Cost"=true

            # Enables the Blood Anvil, a Block similar to the anvil which allows to move enchants from one item to another.
            B:Enabled=true

            # Items from this list cannot receive enchantments from the blood anvil
            S:"Target Item Blacklist" <
             >

            # Treat the blacklist as whitelist
            B:"Target Item Blacklist is Whitelist"=false

            # How many XP Levels using the Blood Anvil will cost, flat
            # Min: 0
            # Max: 2147483647
            I:"XP Level Cost"=100

            # If enabled, will calculate the total cost of the enchantment move depending on the config defined anvil formulas for calculating xp costs
            B:"XP Level Cost Is Dynamic"=false
        }

    }

    ##########################################################################################################
    # enchantment table mechanics
    #--------------------------------------------------------------------------------------------------------#
    # Options for Enchantment Table Mechanics
    ##########################################################################################################

    "enchantment table mechanics" {
        # Allows to enchant already enchanted items on enchanting table.
        # This will add to existing enchants.
        # Incompatible with apotheosis & noexpensive
        B:"(MixinToggle) Allow Re-Enchant"=true

        # Restores older minecraft versions behavior of rolling new enchantments whenever the item gets placed fresh into the enchantment table.
        # Incompatible with apotheosis
        B:"(MixinToggle) Always reroll table"=false

        # Max level the vanilla enchanting table can roll. 
        # Only works in steps of 2.
        # Set to -1 to disable mixin (requires restart)
        # Incompatible with apotheosis
        # Min: -1
        # Max: 2147483647
        I:"(MixinToggle) Enchantment Table Max Lvl"=30

        # Shows the enchantment clue directly in the GUI of the enchantment table instead of needing to hover.
        B:"(MixinToggle) Preview Enchantment Clue"=false

        # Whether to consider enchants being incompatible with each other when enchanting an item again in the enchanting table.
        # Requires "Allow Re-Enchant"
        B:"Re-Enchant Allow Incompatible"=false

        # Set to true to allow items to be re-enchanted even if they already have been used on the anvil
        # Requires "Allow Re-Enchant"
        B:"Re-Enchant Already Anviled"=false

        # Whether to combine lvls of same enchantments when enchanting an item again in the enchanting table.
        # NOTE: if the all rolled enchants already are on the item, the enchantment wont be possible.
        # Requires "Allow Re-Enchant"
        B:"Re-Enchant Combine Existing"=false

        # The Chance to skip incrementing the enchant count when enchanting an item.
        # To add a chance to be allowed to re-enchant more than expected
        # Requires "Allow Re-Enchant"
        # Min: 0.0
        # Max: 1.0
        D:"Re-Enchant Count Skip Increment Chance"=0.20000000298023224

        # How often items can be (re-) enchanted with the enchanting table.
        # NOTE: items enchanted through other means (loot etc) will start at 0 uses just like unenchanted crafted items
        # Set to 0 to not allow anything to be enchanted
        # Set to 1 to allow re-enchanting pre-enchanted loot once
        # Requires "Allow Re-Enchant"
        # Min: 0
        # Max: 2147483647
        I:"Re-Enchant Max Count"=1
    }

    ##########################################################################################################
    # compat
    #--------------------------------------------------------------------------------------------------------#
    # Mod Compatibility
    ##########################################################################################################

    compat {

        jei {
            # Adds information about which equipment slots enchantments are searched at to enchanted books in JEI
            B:"Add JEI Applicable Slot Id Info"=false

            # Adds information about enchantability levels to enchanted books in JEI
            B:"Add JEI Enchantability Info"=true

            # Adds information about enchantment descriptions to enchanted books in JEI
            B:"Add JEI Enchantment Description Info"=true

            # Adds information about enchantment id (modid:enchid) to enchanted books in JEI
            B:"Add JEI Enchantment Id Info"=true

            # Adds information about incompatible enchantments to enchanted books in JEI
            B:"Add JEI Incompat Info"=true

            # Adds information about item types to enchanted books in JEI
            B:"Add JEI Item Types Info"=true

            # Adds information about rarity, treasure and curse status to enchanted books in JEI
            B:"Add JEI Rarity, Trasure, Curse Info"=true

            # Adds information about xp price (when on book/when on item) on anvil and potential emerald price range on Librarians to enchanted books in JEI
            B:"Add JEI XP & Emerald Price Info"=false

            # Global toggle for enchantment info JEI Plugin
            B:"Enabled Enchantment Info Plugin"=true
        }

    }

}


