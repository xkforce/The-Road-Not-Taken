Tweaker.setScriptStage("BIOME_REGISTRY")

Tweaker.createBiome("magentapaintmines")
magentapaintmines = forBiomes("biometweaker:magentapaintmines")
magentapaintmines.set("name", "Paint Mines")
magentapaintmines.set("height", 5.23)
magentapaintmines.set("heightVariation", 0.025)
magentapaintmines.set("temperature", 2.0)
magentapaintmines.set("humidity", 0.0)
magentapaintmines.set("enableRain", false)
magentapaintmines.set("enableSnow", false)
magentapaintmines.set("genVillages", false)
magentapaintmines.set("topBlock", "minecraft:stone")
magentapaintmines.set("fillerBlock", "minecraft:stone")
magentapaintmines.set("grassColor", -4212907)
magentapaintmines.set("foliageColor", -5331926)
magentapaintmines.set("waterColor", 4159204)

Tweaker.setPlacementStage("PRE_POPULATE")
whitesandstone = forBlock("biomesoplenty:white_sandstone")
blockRepwhitesandstone = newBlockReplacement()
blockRepwhitesandstone.set("block", whitesandstone)
blockRepwhitesandstone.set("minY", 109)
blockRepwhitesandstone.set("maxY", 140)

Tweaker.setPlacementStage("PRE_POPULATE")
magentamudstone = forBlock("contenttweaker:magentamudstone")
blockRepmagentamudstone = newBlockReplacement()
blockRepmagentamudstone.set("block", magentamudstone)
blockRepmagentamudstone.set("minY", 139)
blockRepmagentamudstone.set("maxY", 150)

Tweaker.setPlacementStage("PRE_POPULATE")
blockRepwhitesandstone2 = newBlockReplacement()
blockRepwhitesandstone2.set("block", whitesandstone)
blockRepwhitesandstone2.set("minY", 149)
blockRepwhitesandstone2.set("maxY", 170)

magentapaintmines.registerGenBlockRep("minecraft:stone", blockRepwhitesandstone)
magentapaintmines.registerGenBlockRep("minecraft:stone", blockRepmagentamudstone)
magentapaintmines.registerGenBlockRep("minecraft:stone", blockRepwhitesandstone2)

magentapaintmines.removeDecoration("LAKE_WATER")
magentapaintmines.removeFeature("LAKE")














































