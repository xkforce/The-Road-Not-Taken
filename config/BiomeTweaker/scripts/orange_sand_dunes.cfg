Tweaker.setScriptStage("BIOME_REGISTRY")

Tweaker.createBiome("orangesanddunes", "biomesoplenty:highland")
orangesanddunes = forBiomes("biometweaker:orangesanddunes")
orangesanddunes.set("name", "Orange Sand Dunes")
orangesanddunes.set("height", 5.82)
orangesanddunes.set("temperature", 2.0)
orangesanddunes.set("humidity", 0.0)
orangesanddunes.set("topBlock", "minecraft:sand")
orangesanddunes.set("fillerBlock", "minecraft:sand")
orangesanddunes.set("grassColor", -4212907)
orangesanddunes.set("foliageColor", -5331926)
orangesanddunes.set("waterColor", 4159204)
orangesanddunes.removeDecoration("LAKE_WATER")
orangesanddunes.removeFeature("LAKE")
orangesanddunes.removeAllSpawns("WATER_CREATURE")
orangesanddunes.removeAllSpawns("CREATURE")
orangesanddunes.removeDecoration("TREE")
orangesanddunes.addDicTypes("HILLS")
orangesanddunes.addDicTypes("DRY")
orangesanddunes.addDicTypes("HOT")
orangesanddunes.addDicTypes("SANDY")

Tweaker.setPlacementStage("PRE_POPULATE")
orangesand = forBlock("bblsom:frappesand")
blockRepsand = newBlockReplacement()
blockRepsand.set("block", orangesand)
blockRepsand.set("minY", 124)
blockRepsand.set("maxY", 200)

orangesandstone = forBlock("contenttweaker:orangesandstone")
blockReporangesandstone = newBlockReplacement()
blockReporangesandstone.set("block", orangesandstone)
blockReporangesandstone.set("minY", 124)

stone = forBlock("minecraft:stone")
blockRepstone = newBlockReplacement()
blockRepstone.set("block", stone)
blockRepstone.set("maxY", 125)

orangesanddunes.registerGenBlockRep("minecraft:sand", blockRepsand)
orangesanddunes.registerGenBlockRep("minecraft:sandstone", blockReporangesandstone)
orangesanddunes.registerGenBlockRep("minecraft:sandstone", blockRepstone)



























































































