purpleredpaintmines.set("height", 5.23)
purpleredpaintmines.set("heightVariation", 0.025)
purpleredpaintmines.set("temperature", 2.0)
purpleredpaintmines.set("humidity", 0.0)
purpleredpaintmines.set("enableRain", false)
purpleredpaintmines.set("enableSnow", false)
purpleredpaintmines.set("genVillages", false)
purpleredpaintmines.set("topBlock", "minecraft:stone")
purpleredpaintmines.set("fillerBlock", "minecraft:stone")
purpleredpaintmines.set("grassColor", -4212907)
purpleredpaintmines.set("foliageColor", -5331926)
purpleredpaintmines.set("waterColor", 4159204)

Tweaker.setPlacementStage("PRE_POPULATE")
whitesandstone = forBlock("biomesoplenty:white_sandstone")
