blockRepwhitesandstone.set("minY", 109)
blockRepwhitesandstone.set("maxY", 140)

Tweaker.setPlacementStage("PRE_POPULATE")
purpleredmudstone = forBlock("contenttweaker:spicy_purplemudstone")
blockReppurpleredmudstone = newBlockReplacement()
blockReppurpleredmudstone.set("block", spicy_mudstone)
blockReppurpleredmudstone.set("minY", 139)
blockReppurpleredmudstone.set("maxY", 150)

Tweaker.setPlacementStage("PRE_POPULATE")
blockRepwhitesandstone2 = newBlockReplacement()
blockRepwhitesandstone2.set("block", whitesandstone)
blockRepwhitesandstone2.set("minY", 149)
blockRepwhitesandstone2.set("maxY", 170)

purpleredpaintmines.registerGenBlockRep("minecraft:stone", blockRepwhitesandstone)
purpleredpaintmines.registerGenBlockRep("minecraft:stone", blockReppurpleredmudstone)
purpleredpaintmines.registerGenBlockRep("minecraft:stone", blockRepwhitesandstone2)

purpleredpaintmines.removeDecoration("LAKE_WATER")
purpleredpaintmines.removeFeature("LAKE")














































