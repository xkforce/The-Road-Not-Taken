Tweaker.setScriptStage("BIOME_REGISTRY")

Tweaker.createBiome("redpaintmines")
redpaintmines = forBiomes("biometweaker:redpaintmines")
redpaintmines.set("name", "Red Paint Mines")
redpaintmines.set("height", 5.23)
redpaintmines.set("heightVariation", 0.025)
redpaintmines.set("temperature", 2.0)
redpaintmines.set("humidity", 0.0)
redpaintmines.set("enableRain", false)
redpaintmines.set("enableSnow", false)
redpaintmines.set("genVillages", false)
redpaintmines.set("topBlock", "minecraft:stone")
redpaintmines.set("fillerBlock", "minecraft:stone")
redpaintmines.set("grassColor", -4212907)
redpaintmines.set("foliageColor", -5331926)
redpaintmines.set("waterColor", 4159204)
redpaintmines.removeDecoration("TREE")

Tweaker.setPlacementStage("PRE_POPULATE")
whitesandstone = forBlock("biomesoplenty:white_sandstone")
blockRepwhitesandstone = newBlockReplacement()
blockRepwhitesandstone.set("block", whitesandstone)
blockRepwhitesandstone.set("minY", 109)
blockRepwhitesandstone.set("maxY", 140)

redhardenedclay = forBlock("minecraft:stained_hardened_clay")
redhardenedclay.setProperty("color", "red")
blockRepredhardenedclay = newBlockReplacement()
blockRepredhardenedclay.set("block", redhardenedclay)
blockRepredhardenedclay.set("minY", 139)
blockRepredhardenedclay.set("maxY", 150)

blockRepwhitesandstone2 = newBlockReplacement()
blockRepwhitesandstone2.set("block", whitesandstone)
blockRepwhitesandstone2.set("minY", 149)
blockRepwhitesandstone2.set("maxY", 170)

redpaintmines.registerGenBlockRep("minecraft:stone", blockRepwhitesandstone)
redpaintmines.registerGenBlockRep("minecraft:stone", blockRepredhardenedclay)
redpaintmines.registerGenBlockRep("minecraft:stone", blockRepwhitesandstone2)

redpaintmines.removeDecoration("LAKE_WATER")
redpaintmines.removeFeature("LAKE")














































