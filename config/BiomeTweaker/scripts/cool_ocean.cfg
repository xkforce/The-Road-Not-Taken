Tweaker.setScriptStage("BIOME_REGISTRY")

Tweaker.createBiome("coolocean")
coolocean = forBiomes("biometweaker:coolocean")
coolocean.set("name", "Cool Ocean")
coolocean.set("height", 2.76)
coolocean.set("heightVariation", 0.1)
coolocean.set("temperature", 0.35)
coolocean.set("humidity", 0.5)
coolocean.set("enableSnow", false)
coolocean.set("genVillages", false)
coolocean.set("topBlock", "minecraft:grass")
coolocean.set("oceanTopBlock", "minecraft:gravel")
coolocean.set("fillerBlock", "minecraft:stone")
coolocean.set("oceanFillerBlock", "minecraft:gravel")
coolocean.addDicTypes("HOT")
coolocean.addDicTypes("OCEAN")
coolocean.addDicTypes("WATER")





















































