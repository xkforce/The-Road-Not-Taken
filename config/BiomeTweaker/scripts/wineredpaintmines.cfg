Tweaker.setScriptStage("BIOME_REGISTRY")

Tweaker.createBiome("wineredpaintmines")
wineredpaintmines = forBiomes("biometweaker:wineredpaintmines")
wineredpaintmines.set("name", "Wine Red Paint Mines")
wineredpaintmines.set("height", 5.23)
wineredpaintmines.set("heightVariation", 0.025)
wineredpaintmines.set("temperature", 2.0)
wineredpaintmines.set("humidity", 0.0)
wineredpaintmines.set("enableRain", false)
wineredpaintmines.set("enableSnow", false)
wineredpaintmines.set("genVillages", false)
wineredpaintmines.set("topBlock", "minecraft:stone")
wineredpaintmines.set("fillerBlock", "minecraft:stone")
wineredpaintmines.set("grassColor", -4212907)
wineredpaintmines.set("foliageColor", -5331926)
wineredpaintmines.set("waterColor", 4159204)
wineredpaintmines.removeDecoration("TREE")

Tweaker.setPlacementStage("PRE_POPULATE")
whitesandstone = forBlock("biomesoplenty:white_sandstone")
blockRepwhitesandstone = newBlockReplacement()
blockRepwhitesandstone.set("block", whitesandstone)
blockRepwhitesandstone.set("minY", 109)
blockRepwhitesandstone.set("maxY", 140)

wineredhardenedclay = forBlock("contenttweaker:arcane_redhardenedclay")
blockRepwineredhardenedclay = newBlockReplacement()
blockRepwineredhardenedclay.set("block", wineredhardenedclay)
blockRepwineredhardenedclay.set("minY", 139)
blockRepwineredhardenedclay.set("maxY", 150)

blockRepwhitesandstone2 = newBlockReplacement()
blockRepwhitesandstone2.set("block", whitesandstone)
blockRepwhitesandstone2.set("minY", 149)
blockRepwhitesandstone2.set("maxY", 170)

wineredpaintmines.registerGenBlockRep("minecraft:stone", blockRepwhitesandstone)
wineredpaintmines.registerGenBlockRep("minecraft:stone", blockRepwineredhardenedclay)
wineredpaintmines.registerGenBlockRep("minecraft:stone", blockRepwhitesandstone2)

wineredpaintmines.removeDecoration("LAKE_WATER")
wineredpaintmines.removeFeature("LAKE")

























































































