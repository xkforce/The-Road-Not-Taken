Tweaker.setScriptStage("BIOME_REGISTRY")

Tweaker.createBiome("bluepaintmines")
bluepaintmines = forBiomes("biometweaker:bluepaintmines")
bluepaintmines.set("name", "Paint Mines")
bluepaintmines.set("height", 5.23)
bluepaintmines.set("heightVariation", 0.025)
bluepaintmines.set("temperature", 2.0)
bluepaintmines.set("humidity", 0.0)
bluepaintmines.set("enableRain", false)
bluepaintmines.set("enableSnow", false)
bluepaintmines.set("genVillages", false)
bluepaintmines.set("topBlock", "minecraft:stone")
bluepaintmines.set("fillerBlock", "minecraft:stone")
bluepaintmines.set("grassColor", -4212907)
bluepaintmines.set("foliageColor", -5331926)
bluepaintmines.set("waterColor", 4159204)

Tweaker.setPlacementStage("PRE_POPULATE")
whitesandstone = forBlock("biomesoplenty:white_sandstone")
blockRepwhitesandstone = newBlockReplacement()
blockRepwhitesandstone.set("block", whitesandstone)
blockRepwhitesandstone.set("minY", 109)
blockRepwhitesandstone.set("maxY", 140)

Tweaker.setPlacementStage("PRE_POPULATE")
bluemudstone = forBlock("contenttweaker:bluemudstone")
blockRepbluemudstone = newBlockReplacement()
blockRepbluemudstone.set("block", bluemudstone)
blockRepbluemudstone.set("minY", 139)
blockRepbluemudstone.set("maxY", 150)

Tweaker.setPlacementStage("PRE_POPULATE")
blockRepwhitesandstone2 = newBlockReplacement()
blockRepwhitesandstone2.set("block", whitesandstone)
blockRepwhitesandstone2.set("minY", 149)
blockRepwhitesandstone2.set("maxY", 170)

bluepaintmines.registerGenBlockRep("minecraft:stone", blockRepwhitesandstone)
bluepaintmines.registerGenBlockRep("minecraft:stone", blockRepbluemudstone)
bluepaintmines.registerGenBlockRep("minecraft:stone", blockRepwhitesandstone2)

bluepaintmines.removeDecoration("LAKE_WATER")
bluepaintmines.removeFeature("LAKE")














































