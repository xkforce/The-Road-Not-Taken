Tweaker.setScriptStage("BIOME_REGISTRY")

Tweaker.createBiome("icewastes")
icewastes = forBiomes("biometweaker:icewastes")
icewastes.set("name", "Ice Wastes")
icewastes.set("height", 3.88)
icewastes.set("heightVariation", 0.025)
icewastes.set("temperature", -0.5)
icewastes.set("humidity", 0.0)
icewastes.set("genVillages", false)
icewastes.set("topBlock", "minecraft:ice")
icewastes.set("fillerBlock", "minecraft:packed_ice")
icewastes.addDicTypes("COLD")
icewastes.addDicTypes("DRY")
icewastes.removeGeneratorBOP("miners_delight")





































