Tweaker.setScriptStage("BIOME_REGISTRY")

Tweaker.createBiome("tansanddunes", "biomesoplenty:highland")
tansanddunes = forBiomes("biometweaker:tansanddunes")
tansanddunes.set("name", "Tan Sand Dunes")
tansanddunes.set("height", 5.82)
tansanddunes.set("temperature", 2.0)
tansanddunes.set("humidity", 0.0)
tansanddunes.set("topBlock", "minecraft:sand")
tansanddunes.set("fillerBlock", "minecraft:sand")
tansanddunes.set("grassColor", -4212907)
tansanddunes.set("foliageColor", -5331926)
tansanddunes.set("waterColor", 4159204)
tansanddunes.removeDecoration("LAKE_WATER")
tansanddunes.removeFeature("LAKE")
tansanddunes.removeAllSpawns("WATER_CREATURE")
tansanddunes.removeAllSpawns("CREATURE")
tansanddunes.removeDecoration("TREE")
tansanddunes.addDicTypes("HILLS")
tansanddunes.addDicTypes("DRY")
tansanddunes.addDicTypes("HOT")
tansanddunes.addDicTypes("SANDY")

Tweaker.setPlacementStage("PRE_POPULATE")
tansand = forBlock("bblsom:frappesand")
blockRepsand = newBlockReplacement()
blockRepsand.set("block", tansand)
blockRepsand.set("minY", 124)
blockRepsand.set("maxY", 200)

tansandstone = forBlock("contenttweaker:tansandstone")
blockReptansandstone = newBlockReplacement()
blockReptansandstone.set("block", tansandstone)
blockReptansandstone.set("minY", 124)

stone = forBlock("minecraft:stone")
blockRepstone = newBlockReplacement()
blockRepstone.set("block", stone)
blockRepstone.set("maxY", 125)

tansanddunes.registerGenBlockRep("minecraft:sand", blockRepsand)
tansanddunes.registerGenBlockRep("minecraft:sandstone", blockReptansandstone)
tansanddunes.registerGenBlockRep("minecraft:sandstone", blockRepstone)














































