Tweaker.setScriptStage("BIOME_REGISTRY")

andesite = forBlock("minecraft:stone")
andesite.setProperty("variant", "andesite")

Tweaker.createBiome("andesiteplateau")
andesiteplateau = forBiomes("biometweaker:andesiteplateau")
andesiteplateau.set("name", "Stone Plateau")
andesiteplateau.set("height", 3.88)
andesiteplateau.set("heightVariation", 0.2)
andesiteplateau.set("topBlock", "andesite")
andesiteplateau.set("fillerBlock", "andesite")
andesiteplateau.set("genVillages", false)

Tweaker.setPlacementStage("PRE_POPULATE")
blockRepandesite = newBlockReplacement()
blockRepandesite.set("block", andesite)
blockRepandesite.set("minY", 1)
blockRepandesite.set("maxY", 200)
andesiteplateau.registerGenBlockRep("minecraft:stone", blockRepandesite)





































