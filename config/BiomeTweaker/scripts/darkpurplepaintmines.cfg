Tweaker.setScriptStage("BIOME_REGISTRY")

Tweaker.createBiome("darkpurplepaintmines")
darkpurplepaintmines = forBiomes("biometweaker:darkpurplepaintmines")
darkpurplepaintmines.set("name", "Dark Purple Paint Mines")
darkpurplepaintmines.set("height", 5.23)
darkpurplepaintmines.set("heightVariation", 0.025)
darkpurplepaintmines.set("temperature", 2.0)
darkpurplepaintmines.set("humidity", 0.0)
darkpurplepaintmines.set("enableRain", false)
darkpurplepaintmines.set("enableSnow", false)
darkpurplepaintmines.set("genVillages", false)
darkpurplepaintmines.set("topBlock", "minecraft:stone")
darkpurplepaintmines.set("fillerBlock", "minecraft:stone")
darkpurplepaintmines.set("grassColor", -4212907)
darkpurplepaintmines.set("foliageColor", -5331926)
darkpurplepaintmines.set("waterColor", 4159204)
darkpurplepaintmines.removeDecoration("TREE")

Tweaker.setPlacementStage("PRE_POPULATE")
whitesandstone = forBlock("biomesoplenty:white_sandstone")
blockRepwhitesandstone = newBlockReplacement()
blockRepwhitesandstone.set("block", whitesandstone)
blockRepwhitesandstone.set("minY", 109)
blockRepwhitesandstone.set("maxY", 140)

Tweaker.setPlacementStage("PRE_POPULATE")
darkpurplehardenedclay = forBlock("contenttweaker:purple_protegehardenedclay")
blockRepdarkpurplehardenedclay = newBlockReplacement()
blockRepdarkpurplehardenedclay.set("block", darkpurplehardenedclay)
blockRepdarkpurplehardenedclay.set("minY", 139)
blockRepdarkpurplehardenedclay.set("maxY", 150)

Tweaker.setPlacementStage("PRE_POPULATE")
blockRepwhitesandstone2 = newBlockReplacement()
blockRepwhitesandstone2.set("block", whitesandstone)
blockRepwhitesandstone2.set("minY", 149)
blockRepwhitesandstone2.set("maxY", 170)

darkpurplepaintmines.registerGenBlockRep("minecraft:stone", blockRepwhitesandstone)
darkpurplepaintmines.registerGenBlockRep("minecraft:stone", blockRepdarkpurplehardenedclay)
darkpurplepaintmines.registerGenBlockRep("minecraft:stone", blockRepwhitesandstone2)

darkpurplepaintmines.removeDecoration("LAKE_WATER")
darkpurplepaintmines.removeFeature("LAKE")














































