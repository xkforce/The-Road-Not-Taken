Tweaker.setScriptStage("BIOME_REGISTRY")

Tweaker.createBiome("apricotdeserthills", "minecraft:desert_hills")
apricotdeserthills = forBiomes("biometweaker:apricotdeserthills")
apricotdeserthills.set("name", "Apricot Desert Hills")
apricotdeserthills.set("height", 4.43)

Tweaker.setPlacementStage("PRE_POPULATE")
apricotsand = forBlock("bblsom:apricotsand")
blockRepsand = newBlockReplacement()
blockRepsand.set("block", apricotsand)
blockRepsand.set("minY", 124)
blockRepsand.set("maxY", 200)

apricotsandstone = forBlock("contenttweaker:apricotsandstone")
blockRepapricotsandstone = newBlockReplacement()
blockRepapricotsandstone.set("block", apricotsandstone)
blockRepapricotsandstone.set("minY", 124)
blockRepapricotsandstone.set("maxY", 200)

stone = forBlock("minecraft:stone")
blockRepstone = newBlockReplacement()
blockRepstone.set("block", stone)
blockRepstone.set("maxY", 125)

apricotdeserthills.registerGenBlockRep("minecraft:sand", blockRepsand)
apricotdeserthills.registerGenBlockRep("minecraft:sandstone", blockRepapricotsandstone)
apricotdeserthills.registerGenBlockRep("minecraft:sandstone", blockRepstone)

apricotdeserthills.removeDecoration("LAKE_WATER")
apricotdeserthills.removeFeature("LAKE")














































