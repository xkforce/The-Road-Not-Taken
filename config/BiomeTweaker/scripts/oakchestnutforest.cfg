Tweaker.setScriptStage("BIOME_REGISTRY")

Tweaker.createBiome("oakchestnutforest", "minecraft:forest")
oakchestnutforest = forBiomes("biometweaker:oakchestnutforest")
oakchestnutforest.set("name", "Oak Chestnut Forest")
oakchestnutforest.set("height", 4.06)
oakchestnutforest.set("heightVariation", 0.3)
oakchestnutforest.set("humidity", 0.8)
oakchestnutforest.set("enableRain", true)
oakchestnutforest.set("enableSnow", false)
oakchestnutforest.addDicTypes("OAK")
oakchestnutforest.addDicTypes("CHESTNUT")
oakchestnutforest.addDicTypes("FOREST")

















































