Tweaker.setScriptStage("BIOME_REGISTRY")

Tweaker.createBiome("whitesanddunes", "biomesoplenty:highland")
whitesanddunes = forBiomes("biometweaker:whitesanddunes")
whitesanddunes.set("name", "White Sand Dunes")
whitesanddunes.set("height", 5.82)
whitesanddunes.set("temperature", 2.0)
whitesanddunes.set("humidity", 0.0)
whitesanddunes.set("topBlock", "minecraft:sand")
whitesanddunes.set("fillerBlock", "minecraft:sand")
whitesanddunes.set("grassColor", -4212907)
whitesanddunes.set("foliageColor", -5331926)
whitesanddunes.set("waterColor", 4159204)
whitesanddunes.removeDecoration("LAKE_WATER")
whitesanddunes.removeFeature("LAKE")
whitesanddunes.removeAllSpawns("WATER_CREATURE")
whitesanddunes.removeAllSpawns("CREATURE")
whitesanddunes.removeDecoration("TREE")
whitesanddunes.addDicTypes("HILLS")
whitesanddunes.addDicTypes("DRY")
whitesanddunes.addDicTypes("HOT")
whitesanddunes.addDicTypes("SANDY")

Tweaker.setPlacementStage("PRE_POPULATE")
whitesand = forBlock("bblsom:whitesand")
blockRepsand = newBlockReplacement()
blockRepsand.set("block", whitesand)
blockRepsand.set("minY", 124)
blockRepsand.set("maxY", 200)

whitesandstone = forBlock("contenttweaker:whitesandstone")
blockRepwhitesandstone = newBlockReplacement()
blockRepwhitesandstone.set("block", whitesandstone)
blockRepwhitesandstone.set("minY", 124)

stone = forBlock("minecraft:stone")
blockRepstone = newBlockReplacement()
blockRepstone.set("block", stone)
blockRepstone.set("maxY", 125)

whitesanddunes.registerGenBlockRep("minecraft:sand", blockRepsand)
whitesanddunes.registerGenBlockRep("minecraft:sandstone", blockRepwhitesandstone)
whitesanddunes.registerGenBlockRep("minecraft:sandstone", blockRepstone)
