Tweaker.setScriptStage("BIOME_REGISTRY")

Tweaker.createBiome("pinkpaintmines")
pinkpaintmines = forBiomes("biometweaker:pinkpaintmines")
pinkpaintmines.set("name", "Paint Mines")
pinkpaintmines.set("height", 5.23)
pinkpaintmines.set("heightVariation", 0.025)
pinkpaintmines.set("temperature", 2.0)
pinkpaintmines.set("humidity", 0.0)
pinkpaintmines.set("enableRain", false)
pinkpaintmines.set("enableSnow", false)
pinkpaintmines.set("genVillages", false)
pinkpaintmines.set("topBlock", "minecraft:stone")
pinkpaintmines.set("fillerBlock", "minecraft:stone")
pinkpaintmines.set("grassColor", -4212907)
pinkpaintmines.set("foliageColor", -5331926)
pinkpaintmines.set("waterColor", 4159204)

Tweaker.setPlacementStage("PRE_POPULATE")
whitesandstone = forBlock("biomesoplenty:white_sandstone")
blockRepwhitesandstone = newBlockReplacement()
blockRepwhitesandstone.set("block", whitesandstone)
blockRepwhitesandstone.set("minY", 109)
blockRepwhitesandstone.set("maxY", 140)

Tweaker.setPlacementStage("PRE_POPULATE")
pinkmudstone = forBlock("contenttweaker:pinkmudstone")
blockReppinkmudstone = newBlockReplacement()
blockReppinkmudstone.set("block", pinkmudstone)
blockReppinkmudstone.set("minY", 139)
blockReppinkmudstone.set("maxY", 150)

Tweaker.setPlacementStage("PRE_POPULATE")
blockRepwhitesandstone2 = newBlockReplacement()
blockRepwhitesandstone2.set("block", whitesandstone)
blockRepwhitesandstone2.set("minY", 149)
blockRepwhitesandstone2.set("maxY", 170)

pinkpaintmines.registerGenBlockRep("minecraft:stone", blockRepwhitesandstone)
pinkpaintmines.registerGenBlockRep("minecraft:stone", blockReppinkmudstone)
pinkpaintmines.registerGenBlockRep("minecraft:stone", blockRepwhitesandstone2)

pinkpaintmines.removeDecoration("LAKE_WATER")
pinkpaintmines.removeFeature("LAKE")














































