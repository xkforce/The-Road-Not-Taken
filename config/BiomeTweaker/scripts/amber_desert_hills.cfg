Tweaker.setScriptStage("BIOME_REGISTRY")

Tweaker.createBiome("amberdeserthills", "minecraft:desert_hills")
amberdeserthills = forBiomes("biometweaker:amberdeserthills")
amberdeserthills.set("name", "Amber Desert Hills")
amberdeserthills.set("height", 4.43)

Tweaker.setPlacementStage("PRE_POPULATE")
ambersand = forBlock("bblsom:beersand")
blockRepsand = newBlockReplacement()
blockRepsand.set("block", ambersand)
blockRepsand.set("minY", 124)
blockRepsand.set("maxY", 200)

ambersandstone = forBlock("contenttweaker:beersandstone")
blockRepambersandstone = newBlockReplacement()
blockRepambersandstone.set("block", ambersandstone)
blockRepambersandstone.set("minY", 124)
blockRepambersandstone.set("maxY", 200)

stone = forBlock("minecraft:stone")
blockRepstone = newBlockReplacement()
blockRepstone.set("block", stone)
blockRepstone.set("maxY", 125)

amberdeserthills.registerGenBlockRep("minecraft:sand", blockRepsand)
amberdeserthills.registerGenBlockRep("minecraft:sandstone", blockRepambersandstone)
amberdeserthills.registerGenBlockRep("minecraft:sandstone", blockRepstone)

amberdeserthills.removeDecoration("LAKE_WATER")
amberdeserthills.removeFeature("LAKE")














































