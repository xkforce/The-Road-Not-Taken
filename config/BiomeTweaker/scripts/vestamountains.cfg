Tweaker.setScriptStage("BIOME_REGISTRY")

Tweaker.createBiome("vestamountains")
vestamountains = forBiomes("biometweaker:vestamountains", "biomesoplenty:mountain")
vestamountains.set("name", "Vesta Mountains")
vestamountains.set("temperature", 0.5)
vestamountains.set("humidity", 0.0)
vestamountains.set("enableRain", false)
vestamountains.set("enableSnow", false)
vestamountains.set("genVillages", false)
vestamountains.set("topBlock", "bblsom:redasteroiddirt")
vestamountains.set("fillerBlock", "contenttweaker:pigeonite")
vestamountains.removeDecoration("TREE")
vestamountains.removeDecoration("FLOWERS")
vestamountains.removeDecoration("LAKE_WATER")
vestamountains.removeDecoration("LAKE_LAVA")
vestamountains.removeFeature("LAKE")
vestamountains.removeFeature("LAVA")
vestamountains.addDicTypes("SPACE")
vestamountains.addDicTypes("COLD")
vestamountains.addDicTypes("DRY")
vestamountains.removeGeneratorBOP("miners_delight")
vestamountains.removeAllSpawns("AMBIENT")
vestamountains.removeAllSpawns("CREATURE")
vestamountains.removeAllSpawns("MONSTER")
vestamountains.removeAllSpawns("WATER_CREATURE")




































