Tweaker.setScriptStage("BIOME_REGISTRY")

Tweaker.createBiome("purplepaintmines")
purplepaintmines = forBiomes("biometweaker:purplepaintmines")
purplepaintmines.set("name", "Purple Paint Mines")
purplepaintmines.set("height", 5.23)
purplepaintmines.set("heightVariation", 0.025)
purplepaintmines.set("temperature", 2.0)
purplepaintmines.set("humidity", 0.0)
purplepaintmines.set("enableRain", false)
purplepaintmines.set("enableSnow", false)
purplepaintmines.set("genVillages", false)
purplepaintmines.set("topBlock", "minecraft:stone")
purplepaintmines.set("fillerBlock", "minecraft:stone")
purplepaintmines.set("grassColor", -4212907)
purplepaintmines.set("foliageColor", -5331926)
purplepaintmines.set("waterColor", 4159204)
purplepaintmines.removeDecoration("TREE")

Tweaker.setPlacementStage("PRE_POPULATE")
whitesandstone = forBlock("biomesoplenty:white_sandstone")
blockRepwhitesandstone = newBlockReplacement()
blockRepwhitesandstone.set("block", whitesandstone)
blockRepwhitesandstone.set("minY", 109)
blockRepwhitesandstone.set("maxY", 140)

purplehardenedclay = forBlock("minecraft:stained_hardened_clay")
purplehardenedclay.setProperty("color", "purple")
blockReppurplehardenedclay = newBlockReplacement()
blockReppurplehardenedclay.set("block", purplehardenedclay)
blockReppurplehardenedclay.set("minY", 139)
blockReppurplehardenedclay.set("maxY", 150)

blockRepwhitesandstone2 = newBlockReplacement()
blockRepwhitesandstone2.set("block", whitesandstone)
blockRepwhitesandstone2.set("minY", 149)
blockRepwhitesandstone2.set("maxY", 170)

purplepaintmines.registerGenBlockRep("minecraft:stone", blockRepwhitesandstone)
purplepaintmines.registerGenBlockRep("minecraft:stone", blockReppurplehardenedclay)
purplepaintmines.registerGenBlockRep("minecraft:stone", blockRepwhitesandstone2)

purplepaintmines.removeDecoration("LAKE_WATER")
purplepaintmines.removeFeature("LAKE")














































