Tweaker.setScriptStage("BIOME_REGISTRY")

Tweaker.createBiome("tanpaintmines")
tanpaintmines = forBiomes("biometweaker:tanpaintmines")
tanpaintmines.set("name", "Paint Mines")
tanpaintmines.set("height", 5.23)
tanpaintmines.set("heightVariation", 0.025)
tanpaintmines.set("temperature", 2.0)
tanpaintmines.set("humidity", 0.0)
tanpaintmines.set("enableRain", false)
tanpaintmines.set("enableSnow", false)
tanpaintmines.set("genVillages", false)
tanpaintmines.set("topBlock", "minecraft:stone")
tanpaintmines.set("fillerBlock", "minecraft:stone")
tanpaintmines.set("grassColor", -4212907)
tanpaintmines.set("foliageColor", -5331926)
tanpaintmines.set("waterColor", 4159204)

Tweaker.setPlacementStage("PRE_POPULATE")
whitesandstone = forBlock("biomesoplenty:white_sandstone")
blockRepwhitesandstone = newBlockReplacement()
blockRepwhitesandstone.set("block", whitesandstone)
blockRepwhitesandstone.set("minY", 109)
blockRepwhitesandstone.set("maxY", 140)

Tweaker.setPlacementStage("PRE_POPULATE")
tanmudstone = forBlock("contenttweaker:frappemudstone")
blockReptanmudstone = newBlockReplacement()
blockReptanmudstone.set("block", tanmudstone)
blockReptanmudstone.set("minY", 139)
blockReptanmudstone.set("maxY", 150)

Tweaker.setPlacementStage("PRE_POPULATE")
blockRepwhitesandstone2 = newBlockReplacement()
blockRepwhitesandstone2.set("block", whitesandstone)
blockRepwhitesandstone2.set("minY", 149)
blockRepwhitesandstone2.set("maxY", 170)

tanpaintmines.registerGenBlockRep("minecraft:stone", blockRepwhitesandstone)
tanpaintmines.registerGenBlockRep("minecraft:stone", blockReptanmudstone)
tanpaintmines.registerGenBlockRep("minecraft:stone", blockRepwhitesandstone2)

tanpaintmines.removeDecoration("LAKE_WATER")
tanpaintmines.removeFeature("LAKE")














































