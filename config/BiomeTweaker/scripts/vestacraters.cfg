Tweaker.setScriptStage("BIOME_REGISTRY")

Tweaker.createBiome("vestacraters")
vestacraters = forBiomes("biometweaker:vestacraters")
vestacraters.set("name", "V Type Asteroid")
vestacraters.set("height", 3.825)
vestacraters.set("heightVariation", 0.05)
vestacraters.set("temperature", 0.5)
vestacraters.set("humidity", 0.0)
vestacraters.set("enableRain", false)
vestacraters.set("enableSnow", false)
vestacraters.set("genVillages", false)
vestacraters.set("topBlock", "bblsom:redasteroiddirt")
vestacraters.set("fillerBlock", "contenttweaker:pigeonite")
vestacraters.removeDecoration("TREE")
vestacraters.removeDecoration("FLOWERS")
vestacraters.removeDecoration("LAKE_WATER")
vestacraters.removeDecoration("LAKE_LAVA")
vestacraters.removeFeature("LAKE")
vestacraters.removeFeature("LAVA")
vestacraters.addDicTypes("SPACE")
vestacraters.addDicTypes("COLD")
vestacraters.addDicTypes("DRY")
vestacraters.removeGeneratorBOP("miners_delight")
vestacraters.removeAllSpawns("AMBIENT")
vestacraters.removeAllSpawns("CREATURE")
vestacraters.removeAllSpawns("MONSTER")
vestacraters.removeAllSpawns("WATER_CREATURE")




































