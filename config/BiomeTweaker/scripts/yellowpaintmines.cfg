Tweaker.setScriptStage("BIOME_REGISTRY")

Tweaker.createBiome("yellowpaintmines")
yellowpaintmines = forBiomes("biometweaker:yellowpaintmines")
yellowpaintmines.set("name", "Yellow Paint Mines")
yellowpaintmines.set("height", 5.23)
yellowpaintmines.set("heightVariation", 0.025)
yellowpaintmines.set("temperature", 2.0)
yellowpaintmines.set("humidity", 0.0)
yellowpaintmines.set("enableRain", false)
yellowpaintmines.set("enableSnow", false)
yellowpaintmines.set("genVillages", false)
yellowpaintmines.set("topBlock", "minecraft:stone")
yellowpaintmines.set("fillerBlock", "minecraft:stone")
yellowpaintmines.set("grassColor", -4212907)
yellowpaintmines.set("foliageColor", -5331926)
yellowpaintmines.set("waterColor", 4159204)
yellowpaintmines.removeDecoration("TREE")

Tweaker.setPlacementStage("PRE_POPULATE")
whitesandstone = forBlock("biomesoplenty:white_sandstone")
blockRepwhitesandstone = newBlockReplacement()
blockRepwhitesandstone.set("block", whitesandstone)
blockRepwhitesandstone.set("minY", 109)
blockRepwhitesandstone.set("maxY", 140)

yellowhardenedclay = forBlock("minecraft:stained_hardened_clay")
yellowhardenedclay.setProperty("color", "yellow")
blockRepyellowhardenedclay = newBlockReplacement()
blockRepyellowhardenedclay.set("block", yellowhardenedclay)
blockRepyellowhardenedclay.set("minY", 139)
blockRepyellowhardenedclay.set("maxY", 150)

blockRepwhitesandstone2 = newBlockReplacement()
blockRepwhitesandstone2.set("block", whitesandstone)
blockRepwhitesandstone2.set("minY", 149)
blockRepwhitesandstone2.set("maxY", 170)

yellowpaintmines.registerGenBlockRep("minecraft:stone", blockRepwhitesandstone)
yellowpaintmines.registerGenBlockRep("minecraft:stone", blockRepyellowhardenedclay)
yellowpaintmines.registerGenBlockRep("minecraft:stone", blockRepwhitesandstone2)

yellowpaintmines.removeDecoration("LAKE_WATER")
yellowpaintmines.removeFeature("LAKE")














































