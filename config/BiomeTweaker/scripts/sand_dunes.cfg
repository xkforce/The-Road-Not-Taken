Tweaker.setScriptStage("BIOME_REGISTRY")

Tweaker.createBiome("sanddunes", "biomesoplenty:highland")
sanddunes = forBiomes("biometweaker:sanddunes")
sanddunes.set("name", "Sand Dunes")
sanddunes.set("height", 5.82)
sanddunes.set("temperature", 2.0)
sanddunes.set("humidity", 0.0)
sanddunes.set("topBlock", "minecraft:sand")
sanddunes.set("fillerBlock", "minecraft:sand")
sanddunes.set("grassColor", -4212907)
sanddunes.set("foliageColor", -5331926)
sanddunes.set("waterColor", 4159204)
sanddunes.removeDecoration("LAKE_WATER")
sanddunes.removeFeature("LAKE")
sanddunes.removeAllSpawns("WATER_CREATURE")
sanddunes.removeAllSpawns("CREATURE")
sanddunes.removeDecoration("TREE")
sanddunes.addDicTypes("HILLS")
sanddunes.addDicTypes("DRY")
sanddunes.addDicTypes("HOT")
sanddunes.addDicTypes("SANDY")


Tweaker.setPlacementStage("PRE_POPULATE")
sand = forBlock("bblsom:sand")
blockRepsand = newBlockReplacement()
blockRepsand.set("block", sand)
blockRepsand.set("minY", 124)
blockRepsand.set("maxY", 200)

sandstone = forBlock("minecraft:sandstone")
blockRepsandstone = newBlockReplacement()
blockRepsandstone.set("block", sandstone)
blockRepsandstone.set("minY", 124)

stone = forBlock("minecraft:stone")
blockRepstone = newBlockReplacement()
blockRepstone.set("block", stone)
blockRepstone.set("maxY", 125)

sanddunes.registerGenBlockRep("minecraft:sand", blockRepsand)
sanddunes.registerGenBlockRep("minecraft:sandstone", blockRepsandstone)
sanddunes.registerGenBlockRep("minecraft:sandstone", blockRepstone)












































