Tweaker.setScriptStage("BIOME_REGISTRY")

Tweaker.createBiome("ambersanddunes", "biomesoplenty:highland")
ambersanddunes = forBiomes("biometweaker:ambersanddunes")
ambersanddunes.set("name", "Amber Sand Dunes")
ambersanddunes.set("height", 5.82)
ambersanddunes.set("temperature", 2.0)
ambersanddunes.set("humidity", 0.0)
ambersanddunes.set("topBlock", "minecraft:sand")
ambersanddunes.set("fillerBlock", "minecraft:sand")
ambersanddunes.set("grassColor", -4212907)
ambersanddunes.set("foliageColor", -5331926)
ambersanddunes.set("waterColor", 4159204)
ambersanddunes.removeDecoration("LAKE_WATER")
ambersanddunes.removeFeature("LAKE")
ambersanddunes.removeAllSpawns("WATER_CREATURE")
ambersanddunes.removeAllSpawns("CREATURE")
ambersanddunes.removeDecoration("TREE")
ambersanddunes.addDicTypes("HILLS")
ambersanddunes.addDicTypes("DRY")
ambersanddunes.addDicTypes("HOT")
ambersanddunes.addDicTypes("SANDY")

Tweaker.setPlacementStage("PRE_POPULATE")
ambersand = forBlock("bblsom:frappesand")
blockRepsand = newBlockReplacement()
blockRepsand.set("block", ambersand)
blockRepsand.set("minY", 124)
blockRepsand.set("maxY", 200)

ambersandstone = forBlock("contenttweaker:ambersandstone")
blockRepambersandstone = newBlockReplacement()
blockRepambersandstone.set("block", ambersandstone)
blockRepambersandstone.set("minY", 124)

stone = forBlock("minecraft:stone")
blockRepstone = newBlockReplacement()
blockRepstone.set("block", stone)
blockRepstone.set("maxY", 125)

ambersanddunes.registerGenBlockRep("minecraft:sand", blockRepsand)
ambersanddunes.registerGenBlockRep("minecraft:sandstone", blockRepambersandstone)
ambersanddunes.registerGenBlockRep("minecraft:sandstone", blockRepstone)




























































































