Tweaker.setScriptStage("BIOME_REGISTRY")

Tweaker.createBiome("tandeserthills", "minecraft:desert_hills")
tandeserthills = forBiomes("biometweaker:tandeserthills")
tandeserthills.set("name", "Tan Desert Hills")
tandeserthills.set("height", 4.43)

Tweaker.setPlacementStage("PRE_POPULATE")
tansand = forBlock("bblsom:frappesand")
blockRepsand = newBlockReplacement()
blockRepsand.set("block", tansand)
blockRepsand.set("minY", 124)
blockRepsand.set("maxY", 200)

tansandstone = forBlock("contenttweaker:frappesand")
blockReptansandstone = newBlockReplacement()
blockReptansandstone.set("block", tansandstone)
blockReptansandstone.set("minY", 124)
blockReptansandstone.set("maxY", 200)

stone = forBlock("minecraft:stone")
blockRepstone = newBlockReplacement()
blockRepstone.set("block", stone)
blockRepstone.set("maxY", 125)

tandeserthills.registerGenBlockRep("minecraft:sand", blockRepsand)
tandeserthills.registerGenBlockRep("minecraft:sandstone", blockReptansandstone)
tandeserthills.registerGenBlockRep("minecraft:sandstone", blockRepstone)

tandeserthills.removeDecoration("LAKE_WATER")
tandeserthills.removeFeature("LAKE")














































