Tweaker.setScriptStage("BIOME_REGISTRY")

Tweaker.createBiome("olympusmons1")
olympusmons1 = forBiomes("biometweaker:olympusmons1")
olympusmons1.set("name", "Olympus Mons Peak")
olympusmons1.set("height", 8.0)
olympusmons1.set("heightVariation", 0.05)
olympusmons1.set("temperature", 0.5)
olympusmons1.set("humidity", 0.0)
olympusmons1.set("enableRain", false)
olympusmons1.set("enableSnow", false)
olympusmons1.set("genVillages", false)
olympusmons1.set("topBlock", "contenttweaker:marstone")
olympusmons1.set("fillerBlock", "contenttweaker:marstone")
olympusmons1.removeDecoration("LAKE_WATER")
olympusmons1.removeDecoration("LAKE_LAVA")
olympusmons1.removeDecoration("TREE")
olympusmons1.removeFeature("LAKE")
olympusmons1.removeFeature("LAVA")
olympusmons1.addDicTypes("SPACE")
olympusmons1.addDicTypes("COLD")
olympusmons1.addDicTypes("DRY")
olympusmons1.removeGeneratorBOP("miners_delight")
olympusmons1.removeAllSpawns("AMBIENT")
olympusmons1.removeAllSpawns("CREATURE")
olympusmons1.removeAllSpawns("MONSTER")
olympusmons1.removeAllSpawns("WATER_CREATURE")




















































