Tweaker.setScriptStage("BIOME_REGISTRY")

Tweaker.createBiome("apricotsanddunes", "biomesoplenty:highland")
apricotsanddunes = forBiomes("biometweaker:apricotsanddunes")
apricotsanddunes.set("name", "Apricot Sand Dunes")
apricotsanddunes.set("height", 5.82)
apricotsanddunes.set("temperature", 2.0)
apricotsanddunes.set("humidity", 0.0)
apricotsanddunes.set("topBlock", "minecraft:sand")
apricotsanddunes.set("fillerBlock", "minecraft:sand")
apricotsanddunes.set("grassColor", -4212907)
apricotsanddunes.set("foliageColor", -5331926)
apricotsanddunes.set("waterColor", 4159204)
apricotsanddunes.removeDecoration("LAKE_WATER")
apricotsanddunes.removeFeature("LAKE")
apricotsanddunes.removeAllSpawns("WATER_CREATURE")
apricotsanddunes.removeAllSpawns("CREATURE")
apricotsanddunes.removeDecoration("TREE")
apricotsanddunes.addDicTypes("MOUNTAIN")
apricotsanddunes.addDicTypes("HILLS")
apricotsanddunes.addDicTypes("DRY")
apricotsanddunes.addDicTypes("HOT")
apricotsanddunes.addDicTypes("SANDY")
apricotsanddunes.removeDicTypes("WET")

Tweaker.setPlacementStage("PRE_POPULATE")
apricotsand = forBlock("bblsom:frappesand")
blockRepsand = newBlockReplacement()
blockRepsand.set("block", apricotsand)
blockRepsand.set("minY", 124)
blockRepsand.set("maxY", 200)

apricotsandstone = forBlock("contenttweaker:apricotsandstone")
blockRepapricotsandstone = newBlockReplacement()
blockRepapricotsandstone.set("block", apricotsandstone)
blockRepapricotsandstone.set("minY", 124)

stone = forBlock("minecraft:stone")
blockRepstone = newBlockReplacement()
blockRepstone.set("block", stone)
blockRepstone.set("maxY", 125)

apricotsanddunes.registerGenBlockRep("minecraft:sand", blockRepsand)
apricotsanddunes.registerGenBlockRep("minecraft:sandstone", blockRepapricotsandstone)
apricotsanddunes.registerGenBlockRep("minecraft:sandstone", blockRepstone)





























































































