Tweaker.setScriptStage("BIOME_REGISTRY")

Tweaker.createBiome("saltflats", "minecraft:desert")
saltflats = forBiomes("biometweaker:saltflats")
saltflats.set("name", "Salt Flats")
saltflats.set("height", 3.5)
saltflats.set("heightVariation", 0.025)
saltflats.set("topBlock", "contenttweaker:saltblock")
saltflats.set("fillerBlock", "contenttweaker:saltblock")

Tweaker.setPlacementStage("PRE_POPULATE")
salt = forBlock("contenttweaker:saltblock")
blockRepsalt = newBlockReplacement()
blockRepsalt.set("block", salt)
blockRepsalt.set("minY", 115)
blockRepsalt.set("maxY", 127)

sand = forBlock("minecraft:sand")
blockRepsand = newBlockReplacement()
blockRepsand.set("block", sand)
blockRepsand.set("minY", 127)
blockRepsand.set("maxY", 150)

saltflats.registerGenBlockRep("minecraft:water", blockRepsalt)
saltflats.registerGenBlockRep("contenttweaker:saltblock", blockRepsand)












































