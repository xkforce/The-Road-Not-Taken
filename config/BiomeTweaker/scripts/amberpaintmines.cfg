Tweaker.setScriptStage("BIOME_REGISTRY")

Tweaker.createBiome("amberpaintmines")
amberpaintmines = forBiomes("biometweaker:amberpaintmines")
amberpaintmines.set("name", "Paint Mines")
amberpaintmines.set("height", 5.23)
amberpaintmines.set("heightVariation", 0.025)
amberpaintmines.set("temperature", 2.0)
amberpaintmines.set("humidity", 0.0)
amberpaintmines.set("enableRain", false)
amberpaintmines.set("enableSnow", false)
amberpaintmines.set("genVillages", false)
amberpaintmines.set("topBlock", "minecraft:stone")
amberpaintmines.set("fillerBlock", "minecraft:stone")
amberpaintmines.set("grassColor", -4212907)
amberpaintmines.set("foliageColor", -5331926)
amberpaintmines.set("waterColor", 4159204)

Tweaker.setPlacementStage("PRE_POPULATE")
whitesandstone = forBlock("biomesoplenty:white_sandstone")
blockRepwhitesandstone = newBlockReplacement()
blockRepwhitesandstone.set("block", whitesandstone)
blockRepwhitesandstone.set("minY", 109)
blockRepwhitesandstone.set("maxY", 140)

Tweaker.setPlacementStage("PRE_POPULATE")
ambermudstone = forBlock("contenttweaker:ambermudstone")
blockRepambermudstone = newBlockReplacement()
blockRepambermudstone.set("block", ambermudstone)
blockRepambermudstone.set("minY", 139)
blockRepambermudstone.set("maxY", 150)

Tweaker.setPlacementStage("PRE_POPULATE")
blockRepwhitesandstone2 = newBlockReplacement()
blockRepwhitesandstone2.set("block", whitesandstone)
blockRepwhitesandstone2.set("minY", 149)
blockRepwhitesandstone2.set("maxY", 170)

amberpaintmines.registerGenBlockRep("minecraft:stone", blockRepwhitesandstone)
amberpaintmines.registerGenBlockRep("minecraft:stone", blockRepambermudstone)
amberpaintmines.registerGenBlockRep("minecraft:stone", blockRepwhitesandstone2)

amberpaintmines.removeDecoration("LAKE_WATER")
amberpaintmines.removeFeature("LAKE")














































