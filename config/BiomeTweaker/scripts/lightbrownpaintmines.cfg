Tweaker.setScriptStage("BIOME_REGISTRY")

Tweaker.createBiome("lightbrownpaintmines")
lightbrownpaintmines = forBiomes("biometweaker:lightbrownpaintmines")
lightbrownpaintmines.set("name", "Paint Mines")
lightbrownpaintmines.set("height", 5.23)
lightbrownpaintmines.set("heightVariation", 0.025)
lightbrownpaintmines.set("temperature", 2.0)
lightbrownpaintmines.set("humidity", 0.0)
lightbrownpaintmines.set("enableRain", false)
lightbrownpaintmines.set("enableSnow", false)
lightbrownpaintmines.set("genVillages", false)
lightbrownpaintmines.set("topBlock", "minecraft:stone")
lightbrownpaintmines.set("fillerBlock", "minecraft:stone")
lightbrownpaintmines.set("grassColor", -4212907)
lightbrownpaintmines.set("foliageColor", -5331926)
lightbrownpaintmines.set("waterColor", 4159204)

Tweaker.setPlacementStage("PRE_POPULATE")
whitesandstone = forBlock("biomesoplenty:white_sandstone")
blockRepwhitesandstone = newBlockReplacement()
blockRepwhitesandstone.set("block", whitesandstone)
blockRepwhitesandstone.set("minY", 109)
blockRepwhitesandstone.set("maxY", 140)

Tweaker.setPlacementStage("PRE_POPULATE")
lightbrownmudstone = forBlock("contenttweaker:light_brownmudstone")
blockReplightbrownmudstone = newBlockReplacement()
blockReplightbrownmudstone.set("block", lightbrownmudstone)
blockReplightbrownmudstone.set("minY", 139)
blockReplightbrownmudstone.set("maxY", 150)

Tweaker.setPlacementStage("PRE_POPULATE")
blockRepwhitesandstone2 = newBlockReplacement()
blockRepwhitesandstone2.set("block", whitesandstone)
blockRepwhitesandstone2.set("minY", 149)
blockRepwhitesandstone2.set("maxY", 170)

lightbrownpaintmines.registerGenBlockRep("minecraft:stone", blockRepwhitesandstone)
lightbrownpaintmines.registerGenBlockRep("minecraft:stone", blockReplightbrownmudstone)
lightbrownpaintmines.registerGenBlockRep("minecraft:stone", blockRepwhitesandstone2)

lightbrownpaintmines.removeDecoration("LAKE_WATER")
lightbrownpaintmines.removeFeature("LAKE")














































