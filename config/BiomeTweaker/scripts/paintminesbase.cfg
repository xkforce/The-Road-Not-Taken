Tweaker.setScriptStage("BIOME_REGISTRY")

Tweaker.createBiome("paintminesbase")
paintminesbase = forBiomes("biometweaker:paintminesbase")
paintminesbase.set("name", "Paint Mines Base")
paintminesbase.set("height", 4.1)
paintminesbase.set("heightVariation", 0.025)
paintminesbase.set("temperature", 2.0)
paintminesbase.set("humidity", 0.0)
paintminesbase.set("enableRain", false)
paintminesbase.set("enableSnow", false)
paintminesbase.set("genVillages", false)
paintminesbase.set("topBlock", "bblsom:whitedirt")
paintminesbase.set("fillerBlock", "minecraft:stone")
paintminesbase.set("grassColor", -4212907)
paintminesbase.set("foliageColor", -5331926)
paintminesbase.set("waterColor", 4159204)
paintminesbase.removeDecoration("TREE")

Tweaker.setPlacementStage("PRE_POPULATE")
whitesandstone = forBlock("biomesoplenty:white_sandstone")
blockRepwhitesandstone = newBlockReplacement()
blockRepwhitesandstone.set("block", whitesandstone)
blockRepwhitesandstone.set("minY", 109)
blockRepwhitesandstone.set("maxY", 140)

Tweaker.setPlacementStage("PRE_POPULATE")
redhardenedclay = forBlock("minecraft:stained_hardened_clay")
redhardenedclay.setProperty("color", "red")
blockRepredhardenedclay = newBlockReplacement()
blockRepredhardenedclay.set("block", redhardenedclay)
blockRepredhardenedclay.set("minY", 139)
blockRepredhardenedclay.set("maxY", 150)

Tweaker.setPlacementStage("PRE_POPULATE")
blockRepwhitesandstone2 = newBlockReplacement()
blockRepwhitesandstone2.set("block", whitesandstone)
blockRepwhitesandstone2.set("minY", 149)
blockRepwhitesandstone2.set("maxY", 170)

paintminesbase.registerGenBlockRep("minecraft:stone", blockRepwhitesandstone)
paintminesbase.registerGenBlockRep("minecraft:stone", blockRepredhardenedclay)
paintminesbase.registerGenBlockRep("minecraft:stone", blockRepwhitesandstone2)

paintminesbase.removeDecoration("LAKE_WATER")
paintminesbase.removeFeature("LAKE")














































