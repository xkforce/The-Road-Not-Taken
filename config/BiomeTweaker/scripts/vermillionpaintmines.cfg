Tweaker.setScriptStage("BIOME_REGISTRY")

Tweaker.createBiome("vermillionpaintmines")
vermillionpaintmines = forBiomes("biometweaker:vermillionpaintmines")
vermillionpaintmines.set("name", "Paint Mines")
vermillionpaintmines.set("height", 5.23)
vermillionpaintmines.set("heightVariation", 0.025)
vermillionpaintmines.set("temperature", 2.0)
vermillionpaintmines.set("humidity", 0.0)
vermillionpaintmines.set("enableRain", false)
vermillionpaintmines.set("enableSnow", false)
vermillionpaintmines.set("genVillages", false)
vermillionpaintmines.set("topBlock", "minecraft:stone")
vermillionpaintmines.set("fillerBlock", "minecraft:stone")
vermillionpaintmines.set("grassColor", -4212907)
vermillionpaintmines.set("foliageColor", -5331926)
vermillionpaintmines.set("waterColor", 4159204)

Tweaker.setPlacementStage("PRE_POPULATE")
whitesandstone = forBlock("biomesoplenty:white_sandstone")
blockRepwhitesandstone = newBlockReplacement()
blockRepwhitesandstone.set("block", whitesandstone)
blockRepwhitesandstone.set("minY", 109)
blockRepwhitesandstone.set("maxY", 140)

Tweaker.setPlacementStage("PRE_POPULATE")
vermillionmudstone = forBlock("contenttweaker:langoustinemudstone")
blockRepvermillionmudstone = newBlockReplacement()
blockRepvermillionmudstone.set("block", vermillionmudstone)
blockRepvermillionmudstone.set("minY", 139)
blockRepvermillionmudstone.set("maxY", 150)

Tweaker.setPlacementStage("PRE_POPULATE")
blockRepwhitesandstone2 = newBlockReplacement()
blockRepwhitesandstone2.set("block", whitesandstone)
blockRepwhitesandstone2.set("minY", 149)
blockRepwhitesandstone2.set("maxY", 170)

vermillionpaintmines.registerGenBlockRep("minecraft:stone", blockRepwhitesandstone)
vermillionpaintmines.registerGenBlockRep("minecraft:stone", blockRepvermillionmudstone)
vermillionpaintmines.registerGenBlockRep("minecraft:stone", blockRepwhitesandstone2)

vermillionpaintmines.removeDecoration("LAKE_WATER")
vermillionpaintmines.removeFeature("LAKE")














































