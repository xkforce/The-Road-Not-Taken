Tweaker.setScriptStage("BIOME_REGISTRY")

andesite = forBlock("minecraft:stone")
andesite.setProperty("variant", "andesite")

Tweaker.createBiome("andesitebase")
andesitebase = forBiomes("biometweaker:andesitebase")
andesitebase.set("name", "Stone Base")
andesitebase.set("height", 3.88)
andesitebase.set("heightVariation", 0.025)
andesitebase.set("topBlock", "andesite")
andesitebase.set("fillerBlock", "andesite")
andesitebase.set("genVillages", false)

Tweaker.setPlacementStage("PRE_POPULATE")
blockRepandesite = newBlockReplacement()
blockRepandesite.set("block", andesite)
blockRepandesite.set("minY", 1)
blockRepandesite.set("maxY", 200)
andesitebase.registerGenBlockRep("minecraft:stone", blockRepandesite)




































