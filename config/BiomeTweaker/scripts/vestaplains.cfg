Tweaker.setScriptStage("BIOME_REGISTRY")

Tweaker.createBiome("vestaplains")
vestaplains = forBiomes("biometweaker:vestaplains")
vestaplains.set("name", "V Type Asteroid")
vestaplains.set("height", 3.88)
vestaplains.set("heightVariation", 0.05)
vestaplains.set("temperature", 0.5)
vestaplains.set("humidity", 0.0)
vestaplains.set("enableRain", false)
vestaplains.set("enableSnow", false)
vestaplains.set("genVillages", false)
vestaplains.set("topBlock", "bblsom:redasteroiddirt")
vestaplains.set("fillerBlock", "contenttweaker:pigeonite")
vestaplains.removeDecoration("TREE")
vestaplains.removeDecoration("FLOWERS")
vestaplains.removeDecoration("LAKE_WATER")
vestaplains.removeDecoration("LAKE_LAVA")
vestaplains.removeFeature("LAKE")
vestaplains.removeFeature("LAVA")
vestaplains.addDicTypes("SPACE")
vestaplains.addDicTypes("COLD")
vestaplains.addDicTypes("DRY")
vestaplains.removeGeneratorBOP("miners_delight")
vestaplains.removeAllSpawns("AMBIENT")
vestaplains.removeAllSpawns("CREATURE")
vestaplains.removeAllSpawns("MONSTER")
vestaplains.removeAllSpawns("WATER_CREATURE")




































