Tweaker.setScriptStage("BIOME_REGISTRY")

Tweaker.createBiome("redsanddunes", "biomesoplenty:highland")
redsanddunes = forBiomes("biometweaker:redsanddunes")
redsanddunes.set("name", "Red Sand Dunes")
redsanddunes.set("height", 5.82)
redsanddunes.set("temperature", 2.0)
redsanddunes.set("humidity", 0.0)
redsanddunes.set("topBlock", "minecraft:sand")
redsanddunes.set("fillerBlock", "minecraft:sand")
redsanddunes.set("grassColor", -4212907)
redsanddunes.set("foliageColor", -5331926)
redsanddunes.set("waterColor", 4159204)
redsanddunes.removeDecoration("LAKE_WATER")
redsanddunes.removeFeature("LAKE")
redsanddunes.removeAllSpawns("WATER_CREATURE")
redsanddunes.removeAllSpawns("CREATURE")
redsanddunes.removeDecoration("TREE")
redsanddunes.addDicTypes("MOUNTAIN")
redsanddunes.addDicTypes("HILLS")
redsanddunes.addDicTypes("DRY")
redsanddunes.addDicTypes("HOT")
redsanddunes.addDicTypes("SANDY")
redsanddunes.removeDicTypes("WET")

Tweaker.setPlacementStage("PRE_POPULATE")
redsand = forBlock("minecraft:sand")
redsand.setProperty("variant", "red_sand")
blockRepsand = newBlockReplacement()
blockRepsand.set("block", redsand)
blockRepsand.set("minY", 124)
blockRepsand.set("maxY", 200)

redsandstone = forBlock("minecraft:red_sandstone")
blockRepredsandstone = newBlockReplacement()
blockRepredsandstone.set("block", redsandstone)
blockRepredsandstone.set("minY", 124)

stone = forBlock("minecraft:stone")
blockRepstone = newBlockReplacement()
blockRepstone.set("block", stone)
blockRepstone.set("maxY", 125)

redsanddunes.registerGenBlockRep("minecraft:sand", blockRepsand)
redsanddunes.registerGenBlockRep("minecraft:sandstone", blockRepredsandstone)
redsanddunes.registerGenBlockRep("minecraft:sandstone", blockRepstone)





























































































