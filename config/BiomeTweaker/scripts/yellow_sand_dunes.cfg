Tweaker.setScriptStage("BIOME_REGISTRY")

Tweaker.createBiome("yellowsanddunes", "biomesoplenty:highland")
yellowsanddunes = forBiomes("biometweaker:yellowsanddunes")
yellowsanddunes.set("name", "Yellow Sand Dunes")
yellowsanddunes.set("height", 5.82)
yellowsanddunes.set("temperature", 2.0)
yellowsanddunes.set("humidity", 0.0)
yellowsanddunes.set("topBlock", "minecraft:sand")
yellowsanddunes.set("fillerBlock", "minecraft:sand")
yellowsanddunes.set("grassColor", -4212907)
yellowsanddunes.set("foliageColor", -5331926)
yellowsanddunes.set("waterColor", 4159204)
yellowsanddunes.removeDecoration("LAKE_WATER")
yellowsanddunes.removeFeature("LAKE")
yellowsanddunes.removeAllSpawns("WATER_CREATURE")
yellowsanddunes.removeAllSpawns("CREATURE")
yellowsanddunes.removeDecoration("TREE")
yellowsanddunes.addDicTypes("MOUNTAIN")
yellowsanddunes.addDicTypes("HILLS")
yellowsanddunes.addDicTypes("DRY")
yellowsanddunes.addDicTypes("HOT")
yellowsanddunes.addDicTypes("SANDY")
yellowsanddunes.removeDicTypes("WET")

Tweaker.setPlacementStage("PRE_POPULATE")
yellowsand = forBlock("bblsom:yellowsand")
blockRepsand = newBlockReplacement()
blockRepsand.set("block", yellowsand)
blockRepsand.set("minY", 124)
blockRepsand.set("maxY", 200)

yellowsandstone = forBlock("contenttweaker:yellowsandstone")
blockRepyellowsandstone = newBlockReplacement()
blockRepyellowsandstone.set("block", yellowsandstone)
blockRepyellowsandstone.set("minY", 124)

stone = forBlock("minecraft:stone")
blockRepstone = newBlockReplacement()
blockRepstone.set("block", stone)
blockRepstone.set("maxY", 125)

yellowsanddunes.registerGenBlockRep("minecraft:sand", blockRepsand)
yellowsanddunes.registerGenBlockRep("minecraft:sandstone", blockRepyellowsandstone)
yellowsanddunes.registerGenBlockRep("minecraft:sandstone", blockRepstone)












































