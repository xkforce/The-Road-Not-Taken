Tweaker.setScriptStage("BIOME_REGISTRY")

Tweaker.createBiome("venusianmountains")
venusianmountains = forBiomes("biometweaker:venusianmountains", "biomesoplenty:mountain")
venusianmountains.set("name", "Venusian Mountains")
venusianmountains.set("temperature", 1.5)
venusianmountains.set("humidity", 1.0)
venusianmountains.set("enableSnow", false)
venusianmountains.set("genVillages", false)
venusianmountains.set("topBlock", "bblsom:venusiangrass")
venusianmountains.set("oceanTopBlock", "minecraft:gravel")
venusianmountains.set("fillerBlock", "contenttweaker:venustone")
venusianmountains.set("oceanFillerBlock", "minecraft:gravel")
venusianmountains.addDicTypes("HOT")
venusianmountains.addDicTypes("OCEAN")
venusianmountains.addDicTypes("WATER")
venusianmountains.removeDecoration("TREE")
venusianmountains.removeDecoration("FLOWERS")
venusianmountains.removeAllSpawns("AMBIENT")
venusianmountains.removeAllSpawns("CREATURE")
venusianmountains.removeAllSpawns("MONSTER")
venusianmountains.removeAllSpawns("WATER_CREATURE")



















































