Tweaker.setScriptStage("BIOME_REGISTRY")

Tweaker.createBiome("blacksanddunes", "biomesoplenty:highland")
blacksanddunes = forBiomes("biometweaker:blacksanddunes")
blacksanddunes.set("name", "BLack Sand Dunes")
blacksanddunes.set("height", 5.82)
blacksanddunes.set("temperature", 2.0)
blacksanddunes.set("humidity", 0.0)
blacksanddunes.set("topBlock", "minecraft:sand")
blacksanddunes.set("fillerBlock", "minecraft:sand")
blacksanddunes.set("grassColor", -4212907)
blacksanddunes.set("foliageColor", -5331926)
blacksanddunes.set("waterColor", 4159204)
blacksanddunes.removeDecoration("LAKE_WATER")
blacksanddunes.removeFeature("LAKE")
blacksanddunes.removeAllSpawns("WATER_CREATURE")
blacksanddunes.removeAllSpawns("CREATURE")
blacksanddunes.removeDecoration("TREE")
blacksanddunes.addDicTypes("MOUNTAIN")
blacksanddunes.addDicTypes("HILLS")
blacksanddunes.addDicTypes("DRY")
blacksanddunes.addDicTypes("HOT")
blacksanddunes.addDicTypes("SANDY")
blacksanddunes.removeDicTypes("WET")

Tweaker.setPlacementStage("PRE_POPULATE")
blacksand = forBlock("bblsom:frappesand")
blockRepsand = newBlockReplacement()
blockRepsand.set("block", blacksand)
blockRepsand.set("minY", 124)
blockRepsand.set("maxY", 200)

blacksandstone = forBlock("contenttweaker:blacksandstone")
blockRepblacksandstone = newBlockReplacement()
blockRepblacksandstone.set("block", blacksandstone)
blockRepblacksandstone.set("minY", 124)

stone = forBlock("minecraft:stone")
blockRepstone = newBlockReplacement()
blockRepstone.set("block", stone)
blockRepstone.set("maxY", 125)

blacksanddunes.registerGenBlockRep("minecraft:sand", blockRepsand)
blacksanddunes.registerGenBlockRep("minecraft:sandstone", blockRepblacksandstone)
blacksanddunes.registerGenBlockRep("minecraft:sandstone", blockRepstone)





























































































