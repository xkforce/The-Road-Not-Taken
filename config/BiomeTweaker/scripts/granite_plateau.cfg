Tweaker.setScriptStage("BIOME_REGISTRY")

granite = forBlock("minecraft:stone")
granite.setProperty("variant", "granite")

Tweaker.createBiome("graniteplateau")
graniteplateau = forBiomes("biometweaker:graniteplateau")
graniteplateau.set("name", "Stone Plateau")
graniteplateau.set("height", 3.88)
graniteplateau.set("heightVariation", 0.2)
graniteplateau.set("topBlock", "granite")
graniteplateau.set("fillerBlock", "granite")
graniteplateau.set("genVillages", false)

Tweaker.setPlacementStage("PRE_POPULATE")
blockRepgranite = newBlockReplacement()
blockRepgranite.set("block", granite)
blockRepgranite.set("minY", 1)
blockRepgranite.set("maxY", 200)
graniteplateau.registerGenBlockRep("minecraft:stone", blockRepgranite)





































