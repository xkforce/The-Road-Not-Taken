Tweaker.setScriptStage("BIOME_REGISTRY")

Tweaker.createBiome("apricotdesert", "minecraft:desert")
apricotdesert = forBiomes("biometweaker:apricotdesert")
apricotdesert.set("name", "Apricot Desert")
apricotdesert.set("height", 4.1)

Tweaker.setPlacementStage("PRE_POPULATE")
apricotsand = forBlock("bblsom:apricotsand")
blockRepsand = newBlockReplacement()
blockRepsand.set("block", apricotsand)
blockRepsand.set("minY", 124)
blockRepsand.set("maxY", 150)

apricotsandstone = forBlock("contenttweaker:apricotsandstone")
blockRepapricotsandstone = newBlockReplacement()
blockRepapricotsandstone.set("block", apricotsandstone)
blockRepapricotsandstone.set("minY", 124)

stone = forBlock("minecraft:stone")
blockRepstone = newBlockReplacement()
blockRepstone.set("block", stone)
blockRepstone.set("maxY", 125)

apricotdesert.registerGenBlockRep("minecraft:sand", blockRepsand)
apricotdesert.registerGenBlockRep("minecraft:sandstone", blockRepapricotsandstone)
apricotdesert.registerGenBlockRep("minecraft:sandstone", blockRepstone)

apricotdesert.removeDecoration("LAKE_WATER")
apricotdesert.removeFeature("LAKE")














































