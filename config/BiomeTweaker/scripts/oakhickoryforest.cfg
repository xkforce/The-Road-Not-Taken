Tweaker.setScriptStage("BIOME_REGISTRY")

Tweaker.createBiome("oakhickoryforest", "minecraft:forest")
oakhickoryforest = forBiomes("biometweaker:oakhickoryforest")
oakhickoryforest.set("name", "Oak Chestnut Forest")
oakhickoryforest.set("height", 4.06)
oakhickoryforest.set("heightVariation", 0.3)
oakhickoryforest.set("humidity", 0.8)
oakhickoryforest.set("enableRain", true)
oakhickoryforest.set("enableSnow", false)
oakhickoryforest.addDicTypes("OAK")
oakhickoryforest.addDicTypes("HICKORY")
oakhickoryforest.addDicTypes("FOREST")

















































