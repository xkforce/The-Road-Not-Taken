Tweaker.setScriptStage("BIOME_REGISTRY")

Tweaker.createBiome("lightbluepaintmines")
lightbluepaintmines = forBiomes("biometweaker:lightbluepaintmines")
lightbluepaintmines.set("name", "Paint Mines")
lightbluepaintmines.set("height", 5.23)
lightbluepaintmines.set("heightVariation", 0.025)
lightbluepaintmines.set("temperature", 2.0)
lightbluepaintmines.set("humidity", 0.0)
lightbluepaintmines.set("enableRain", false)
lightbluepaintmines.set("enableSnow", false)
lightbluepaintmines.set("genVillages", false)
lightbluepaintmines.set("topBlock", "minecraft:stone")
lightbluepaintmines.set("fillerBlock", "minecraft:stone")
lightbluepaintmines.set("grassColor", -4212907)
lightbluepaintmines.set("foliageColor", -5331926)
lightbluepaintmines.set("waterColor", 4159204)

Tweaker.setPlacementStage("PRE_POPULATE")
whitesandstone = forBlock("biomesoplenty:white_sandstone")
blockRepwhitesandstone = newBlockReplacement()
blockRepwhitesandstone.set("block", whitesandstone)
blockRepwhitesandstone.set("minY", 109)
blockRepwhitesandstone.set("maxY", 140)

Tweaker.setPlacementStage("PRE_POPULATE")
lightbluemudstone = forBlock("contenttweaker:light_bluemudstone")
blockReplightbluemudstone = newBlockReplacement()
blockReplightbluemudstone.set("block", lightbluemudstone)
blockReplightbluemudstone.set("minY", 139)
blockReplightbluemudstone.set("maxY", 150)

Tweaker.setPlacementStage("PRE_POPULATE")
blockRepwhitesandstone2 = newBlockReplacement()
blockRepwhitesandstone2.set("block", whitesandstone)
blockRepwhitesandstone2.set("minY", 149)
blockRepwhitesandstone2.set("maxY", 170)

lightbluepaintmines.registerGenBlockRep("minecraft:stone", blockRepwhitesandstone)
lightbluepaintmines.registerGenBlockRep("minecraft:stone", blockReplightbluemudstone)
lightbluepaintmines.registerGenBlockRep("minecraft:stone", blockRepwhitesandstone2)

lightbluepaintmines.removeDecoration("LAKE_WATER")
lightbluepaintmines.removeFeature("LAKE")














































