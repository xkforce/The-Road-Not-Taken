Tweaker.setScriptStage("BIOME_REGISTRY")

Tweaker.createBiome("apricotpaintmines")
apricotpaintmines = forBiomes("biometweaker:apricotpaintmines")
apricotpaintmines.set("name", "Apricot Paint Mines")
apricotpaintmines.set("height", 5.23)
apricotpaintmines.set("heightVariation", 0.025)
apricotpaintmines.set("temperature", 2.0)
apricotpaintmines.set("humidity", 0.0)
apricotpaintmines.set("enableRain", false)
apricotpaintmines.set("enableSnow", false)
apricotpaintmines.set("genVillages", false)
apricotpaintmines.set("topBlock", "minecraft:stone")
apricotpaintmines.set("fillerBlock", "minecraft:stone")
apricotpaintmines.set("grassColor", -4212907)
apricotpaintmines.set("foliageColor", -5331926)
apricotpaintmines.set("waterColor", 4159204)
apricotpaintmines.removeDecoration("TREE")

Tweaker.setPlacementStage("PRE_POPULATE")
whitesandstone = forBlock("biomesoplenty:white_sandstone")
blockRepwhitesandstone = newBlockReplacement()
blockRepwhitesandstone.set("block", whitesandstone)
blockRepwhitesandstone.set("minY", 109)
blockRepwhitesandstone.set("maxY", 140)

apricothardenedclay = forBlock("contenttweaker:arcane_redhardenedclay")
blockRepapricothardenedclay = newBlockReplacement()
blockRepapricothardenedclay.set("block", apricothardenedclay)
blockRepapricothardenedclay.set("minY", 139)
blockRepapricothardenedclay.set("maxY", 150)

blockRepwhitesandstone2 = newBlockReplacement()
blockRepwhitesandstone2.set("block", whitesandstone)
blockRepwhitesandstone2.set("minY", 149)
blockRepwhitesandstone2.set("maxY", 170)

apricotpaintmines.registerGenBlockRep("minecraft:stone", blockRepwhitesandstone)
apricotpaintmines.registerGenBlockRep("minecraft:stone", blockRepapricothardenedclay)
apricotpaintmines.registerGenBlockRep("minecraft:stone", blockRepwhitesandstone2)

apricotpaintmines.removeDecoration("LAKE_WATER")
apricotpaintmines.removeFeature("LAKE")

























































































