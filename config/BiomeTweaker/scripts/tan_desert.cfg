Tweaker.setScriptStage("BIOME_REGISTRY")

Tweaker.createBiome("tandesert", "minecraft:desert")
tandesert = forBiomes("biometweaker:tandesert")
tandesert.set("name", "Tan Desert")
tandesert.set("height", 4.2)

Tweaker.setPlacementStage("PRE_POPULATE")
tansand = forBlock("bblsom:frappesand")
blockRepsand = newBlockReplacement()
blockRepsand.set("block", tansand)
blockRepsand.set("minY", 124)
blockRepsand.set("maxY", 150)

tansandstone = forBlock("contenttweaker:frappesandstone")
blockReptansandstone = newBlockReplacement()
blockReptansandstone.set("block", tansandstone)
blockReptansandstone.set("minY", 124)

stone = forBlock("minecraft:stone")
blockRepstone = newBlockReplacement()
blockRepstone.set("block", stone)
blockRepstone.set("maxY", 125)

tandesert.registerGenBlockRep("minecraft:sand", blockRepsand)
tandesert.registerGenBlockRep("minecraft:sandstone", blockReptansandstone)
tandesert.registerGenBlockRep("minecraft:sandstone", blockRepstone)

tandesert.removeDecoration("LAKE_WATER")
tandesert.removeFeature("LAKE")















































