Tweaker.setScriptStage("BIOME_REGISTRY")

Tweaker.createBiome("amberdesert", "minecraft:desert")
amberdesert = forBiomes("biometweaker:amberdesert")
amberdesert.set("name", "Amber Desert")
amberdesert.set("height", 4.2)

Tweaker.setPlacementStage("PRE_POPULATE")
ambersand = forBlock("bblsom:beersand")
blockRepsand = newBlockReplacement()
blockRepsand.set("block", ambersand)
blockRepsand.set("minY", 124)
blockRepsand.set("maxY", 150)

ambersandstone = forBlock("contenttweaker:beersandstone")
blockRepambersandstone = newBlockReplacement()
blockRepambersandstone.set("block", ambersandstone)
blockRepambersandstone.set("minY", 124)

stone = forBlock("minecraft:stone")
blockRepstone = newBlockReplacement()
blockRepstone.set("block", stone)
blockRepstone.set("maxY", 125)

amberdesert.registerGenBlockRep("minecraft:sand", blockRepsand)
amberdesert.registerGenBlockRep("minecraft:sandstone", blockRepambersandstone)
amberdesert.registerGenBlockRep("minecraft:sandstone", blockRepstone)

amberdesert.removeDecoration("LAKE_WATER")
amberdesert.removeFeature("LAKE")














































