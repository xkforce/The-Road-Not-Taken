Tweaker.setScriptStage("BIOME_REGISTRY")

Tweaker.createBiome("orangepaintmines")
orangepaintmines = forBiomes("biometweaker:orangepaintmines")
orangepaintmines.set("name", "Paint Mines")
orangepaintmines.set("height", 5.23)
orangepaintmines.set("heightVariation", 0.025)
orangepaintmines.set("temperature", 2.0)
orangepaintmines.set("humidity", 0.0)
orangepaintmines.set("enableRain", false)
orangepaintmines.set("enableSnow", false)
orangepaintmines.set("genVillages", false)
orangepaintmines.set("topBlock", "minecraft:stone")
orangepaintmines.set("fillerBlock", "minecraft:stone")
orangepaintmines.set("grassColor", -4212907)
orangepaintmines.set("foliageColor", -5331926)
orangepaintmines.set("waterColor", 4159204)

Tweaker.setPlacementStage("PRE_POPULATE")
whitesandstone = forBlock("biomesoplenty:white_sandstone")
blockRepwhitesandstone = newBlockReplacement()
blockRepwhitesandstone.set("block", whitesandstone)
blockRepwhitesandstone.set("minY", 109)
blockRepwhitesandstone.set("maxY", 140)

Tweaker.setPlacementStage("PRE_POPULATE")
orangemudstone = forBlock("contenttweaker:orangemudstone")
blockReporangemudstone = newBlockReplacement()
blockReporangemudstone.set("block", orangemudstone)
blockReporangemudstone.set("minY", 139)
blockReporangemudstone.set("maxY", 150)

Tweaker.setPlacementStage("PRE_POPULATE")
blockRepwhitesandstone2 = newBlockReplacement()
blockRepwhitesandstone2.set("block", whitesandstone)
blockRepwhitesandstone2.set("minY", 149)
blockRepwhitesandstone2.set("maxY", 170)

orangepaintmines.registerGenBlockRep("minecraft:stone", blockRepwhitesandstone)
orangepaintmines.registerGenBlockRep("minecraft:stone", blockReporangemudstone)
orangepaintmines.registerGenBlockRep("minecraft:stone", blockRepwhitesandstone2)

orangepaintmines.removeDecoration("LAKE_WATER")
orangepaintmines.removeFeature("LAKE")














































