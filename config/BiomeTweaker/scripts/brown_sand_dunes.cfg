Tweaker.setScriptStage("BIOME_REGISTRY")

Tweaker.createBiome("brownsanddunes", "biomesoplenty:highland")
brownsanddunes = forBiomes("biometweaker:brownsanddunes")
brownsanddunes.set("name", "Brown Sand Dunes")
brownsanddunes.set("height", 5.82)
brownsanddunes.set("temperature", 2.0)
brownsanddunes.set("humidity", 0.0)
brownsanddunes.set("topBlock", "minecraft:sand")
brownsanddunes.set("fillerBlock", "minecraft:sand")
brownsanddunes.set("grassColor", -4212907)
brownsanddunes.set("foliageColor", -5331926)
brownsanddunes.set("waterColor", 4159204)
brownsanddunes.removeDecoration("LAKE_WATER")
brownsanddunes.removeFeature("LAKE")
brownsanddunes.removeAllSpawns("WATER_CREATURE")
brownsanddunes.removeAllSpawns("CREATURE")
brownsanddunes.removeDecoration("TREE")
brownsanddunes.addDicTypes("MOUNTAIN")
brownsanddunes.addDicTypes("HILLS")
brownsanddunes.addDicTypes("DRY")
brownsanddunes.addDicTypes("HOT")
brownsanddunes.addDicTypes("SANDY")
brownsanddunes.removeDicTypes("WET")

Tweaker.setPlacementStage("PRE_POPULATE")
brownsand = forBlock("bblsom:frappesand")
blockRepsand = newBlockReplacement()
blockRepsand.set("block", brownsand)
blockRepsand.set("minY", 124)
blockRepsand.set("maxY", 200)

brownsandstone = forBlock("contenttweaker:brownsandstone")
blockRepbrownsandstone = newBlockReplacement()
blockRepbrownsandstone.set("block", brownsandstone)
blockRepbrownsandstone.set("minY", 124)

stone = forBlock("minecraft:stone")
blockRepstone = newBlockReplacement()
blockRepstone.set("block", stone)
blockRepstone.set("maxY", 125)

brownsanddunes.registerGenBlockRep("minecraft:sand", blockRepsand)
brownsanddunes.registerGenBlockRep("minecraft:sandstone", blockRepbrownsandstone)
brownsanddunes.registerGenBlockRep("minecraft:sandstone", blockRepstone)



























































































