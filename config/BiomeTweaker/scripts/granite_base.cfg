Tweaker.setScriptStage("BIOME_REGISTRY")

granite = forBlock("minecraft:stone")
granite.setProperty("variant", "granite")

Tweaker.createBiome("granitebase")
granitebase = forBiomes("biometweaker:granitebase")
granitebase.set("name", "Stone Base")
granitebase.set("height", 3.88)
granitebase.set("heightVariation", 0.025)
granitebase.set("topBlock", "granite")
granitebase.set("fillerBlock", "granite")
granitebase.set("genVillages", false)

Tweaker.setPlacementStage("PRE_POPULATE")
blockRepgranite = newBlockReplacement()
blockRepgranite.set("block", granite)
blockRepgranite.set("minY", 1)
blockRepgranite.set("maxY", 200)
granitebase.registerGenBlockRep("minecraft:stone", blockRepgranite)




































