# Configuration file

general {

    ##########################################################################################################
    # master_switches
    #--------------------------------------------------------------------------------------------------------#
    # Master switches for entire modules
    ##########################################################################################################

    master_switches {
        # If enchantments should be enabled
        B:Enchantments=true

        # If beam swords should be enabled
        B:"Equipment: Beam Swords"=true

        # If the Celestial Warhammer should be enabled
        B:"Equipment: Celestial Warhammer"=true

        # If the Meteor Detector should be enabled
        B:"Equipment: Meteor Detector"=true

        # If all tools and armor made out of meteor materials (Meteorite, Frezarite, Kreknorite, and Tektite) should be enabled
        B:"Equipment: Meteor Gear"=true

        # If falling stars (including during star showers) should be enabled
        B:"Events: Falling Stars"=true

        # If lunar events should be enabled
        B:"Events: Lunar"=true

        # If meteors falling from the sky should be enabled
        B:"Events: Meteors"=true

        # If solar events should be enabled
        B:"Events: Solar"=true
    }

    ##########################################################################################################
    # general
    #--------------------------------------------------------------------------------------------------------#
    # Settings for general mechanics
    ##########################################################################################################

    general {
        # The amount of damage that the celestial warhammer deals if the maximum flight time was used
        I:"Celestial Warhammer Ability Damage"=32

        # If celestial events should play a unique sound when they start
        B:"Event Intro Sounds"=true

        # If celestial events should be announced in chat when they start
        B:"Event Notifications"=true

        # If celestial events should tint the sky
        B:"Event Tint"=true

        # If celestial events should also tint underground areas (can look slightly jarring when disabled)
        B:"Event Tint Underground"=true

        # The amount of additional damage that will always be applied regardless of moon phase
        I:"Lunar Edge Damage: Base"=0

        # The amount of additional damage that should be applied to an item with max level lunar edge on a full moon
        D:"Lunar Edge Damage: Max Level"=3.0

        # The amount of additional damage that should be applied to an item with level 1 lunar edge on a full moon
        D:"Lunar Edge Damage: Min Level"=1.0

        # The max multiplier on the amount of XP added (which happens during a full moon)
        # Can be set to 0 to disable lunar edge XP gains
        # The multiplier scales up to the max according to the level and moon phase
        # Example: If the config option is set to 2.5, a full moon with max lunar edge level would give 3.5x XP and a new moon would give 1x XP
        D:"Lunar Edge Max XP Multiplier"=1.0
    }

    ##########################################################################################################
    # entities
    #--------------------------------------------------------------------------------------------------------#
    # Settings for entities
    ##########################################################################################################

    entities {

        ##########################################################################################################
        # eyezor
        #--------------------------------------------------------------------------------------------------------#
        # Eyezor settings
        ##########################################################################################################

        eyezor {
            # The hex code of the Eyezor's laser color
            I:"Laser Color"=6435325
        }

    }

    ##########################################################################################################
    # events_lunar
    #--------------------------------------------------------------------------------------------------------#
    # Settings for lunar events
    ##########################################################################################################

    events_lunar {
        # The numeric IDs of the dimensions that lunar events should occur in
        I:"Allowed Dimensions" <
            0
         >

        ##########################################################################################################
        # blood_moon
        #--------------------------------------------------------------------------------------------------------#
        # Blood Moon settings
        ##########################################################################################################

        blood_moon {
            # The chance in percent (1 = 100%) of the Blood Moon occurring
            # Min: 0.0
            # Max: 1.0
            D:Chance=0.05

            # The hex code of the Blood Moon's cloud color
            I:"Cloud Color"=4328707

            # The registry names of hostile entities that should spawn exclusively on the surface during the event (whitelist)
            # Leave empty to allow all hostile entities to spawn
            S:"Exclusive Spawns" <
             >

            # The registry names of entities that should spawn additionally alongside other entities during the event
            # Syntax: originalEntity;extraEntity
            S:"Extra Spawns" <
                minecraft:zombie;nyx:eyezor
             >

            # The chance for an additional mob to be spawned when a mob spawns during the event
            # The higher the number, the less likely
            # Set to 0 to disable
            # Min: 0
            # Max: 1000
            I:"Extra Spawns Chance"=10

            # The amount of nights that should pass until the Blood Moon happens again
            # Min: 0
            # Max: 2147483647
            I:"Grace Period"=8

            # The hex code of the Blood Moon's lightmap color
            I:"Lightmap Color"=4328707

            # If mobs spawned by the Blood Moon should die at sunrise
            B:"Mobs Vanish"=true

            # The interval in nights at which the Blood Moon should occur
            # Overrides chance setting if set to a value greater than 0
            # Min: 0
            # Max: 2147483647
            I:"Night Interval"=0

            # If the Blood Moon should only occur on full moon nights
            B:"On Full Moon"=false

            # The registry names of entities that should replace other entities during the event
            # Syntax: originalEntity;replacementEntity
            S:"Replacement Spawns" <
             >

            # The hex code of the Blood Moon's sky color
            I:"Sky Color"=4328707

            # If sleeping is allowed during a Blood Moon
            B:Sleeping=false

            # The multiplier with which mobs should spawn during the Blood Moon (eg 2 means 2 mobs spawn instead of 1)
            # Min: 1
            # Max: 1000
            I:"Spawn Multiplier"=2

            # The closest distance that mobs can spawn away from a player during the Blood Moon
            # Vanilla value is 24
            I:"Spawn Radius"=20

            # The amount of nights that should pass before the Blood Moon occurs for the first time
            # Min: 0
            # Max: 2147483647
            I:"Start Night"=0
        }

        ##########################################################################################################
        # blue_moon
        #--------------------------------------------------------------------------------------------------------#
        # Blue Moon settings
        ##########################################################################################################

        blue_moon {
            # The chance in percent (1 = 100%) of the Blue Moon occurring
            # Min: 0.0
            # Max: 1.0
            D:Chance=0.05

            # The hex code of the Blue Moon's cloud color
            I:"Cloud Color"=4145088

            # The registry names of hostile entities that should spawn exclusively on the surface during the event (whitelist)
            # Leave empty to allow all hostile entities to spawn
            S:"Exclusive Spawns" <
                minecraft:slime
             >

            # The registry names of entities that should spawn additionally alongside other entities during the event
            # Syntax: originalEntity;extraEntity
            S:"Extra Spawns" <
             >

            # The chance for an additional mob to be spawned when a mob spawns during the event
            # The higher the number, the less likely
            # Set to 0 to disable
            # Min: 0
            # Max: 1000
            I:"Extra Spawns Chance"=10

            # The amount of nights that should pass until the Blue Moon happens again
            # Min: 0
            # Max: 2147483647
            I:"Grace Period"=8

            # The amount of plants that should be grown per chunk during the Blue Moon
            # Min: 0
            # Max: 100
            I:"Grow Amount"=15

            # The amount of ticks that should pass before plants are grown again during the Blue Moon
            # Min: 1
            # Max: 100
            I:"Grow Interval"=10

            # The hex code of the Blue Moon's lightmap color
            I:"Lightmap Color"=4145088

            # The interval in nights at which the Blue Moon should occur
            # Overrides chance setting if set to a value greater than 0
            # Min: 0
            # Max: 2147483647
            I:"Night Interval"=0

            # If the Blue Moon should only occur on full moon nights
            B:"On Full Moon"=false

            # The registry names of entities that should replace other entities during the event
            # Syntax: originalEntity;replacementEntity
            S:"Replacement Spawns" <
             >

            # The hex code of the Blue Moon's sky color
            I:"Sky Color"=4145088

            # The amount of nights that should pass before the Blue Moon occurs for the first time
            # Min: 0
            # Max: 2147483647
            I:"Start Night"=0
        }

        ##########################################################################################################
        # full_moon
        #--------------------------------------------------------------------------------------------------------#
        # Full Moon settings
        ##########################################################################################################

        full_moon {
            # If the vanilla full moon should be considered a proper lunar event
            B:"Act As Event"=true

            # If mobs spawned during a full moon should have random potion effects applied to them (similarly to spiders in the base game)
            B:"Add Potion Effects"=true

            # The registry names of hostile entities that should spawn exclusively on the surface during the event (whitelist)
            # Leave empty to allow all hostile entities to spawn
            S:"Exclusive Spawns" <
             >

            # The registry names of entities that should spawn additionally alongside other entities during the event
            # Syntax: originalEntity;extraEntity
            S:"Extra Spawns" <
                minecraft:zombie;minecraft:zombie
                minecraft:skeleton;minecraft:skeleton
                minecraft:creeper;minecraft:creeper
                minecraft:spider;minecraft:spider
             >

            # The chance for an additional mob to be spawned when a mob spawns during the event
            # The higher the number, the less likely
            # Set to 0 to disable
            # Min: 0
            # Max: 1000
            I:"Extra Spawns Chance"=10

            # The registry names of entities that should replace other entities during the event
            # Syntax: originalEntity;replacementEntity
            S:"Replacement Spawns" <
             >
        }

        ##########################################################################################################
        # star_shower
        #--------------------------------------------------------------------------------------------------------#
        # Star Shower settings
        ##########################################################################################################

        star_shower {
            # The chance in percent (1 = 100%) of Star Showers occurring
            # Min: 0.0
            # Max: 1.0
            D:Chance=0.05

            # The hex code of the Star Shower's cloud color
            I:"Cloud Color"=14598751

            # The registry names of hostile entities that should spawn exclusively on the surface during the event (whitelist)
            # Leave empty to allow all hostile entities to spawn
            S:"Exclusive Spawns" <
             >

            # The registry names of entities that should spawn additionally alongside other entities during the event
            # Syntax: originalEntity;extraEntity
            S:"Extra Spawns" <
                minecraft:zombie;nyx:eyezor
             >

            # The chance for an additional mob to be spawned when a mob spawns during the event
            # The higher the number, the less likely
            # Set to 0 to disable
            # Min: 0
            # Max: 1000
            I:"Extra Spawns Chance"=10

            # The amount of nights that should pass until Star Showers happen again
            # Min: 0
            # Max: 2147483647
            I:"Grace Period"=15

            # The hex code of the Star Shower's lightmap color
            I:"Lightmap Color"=14598751

            # The interval in nights at which Star Showers should occur
            # Overrides chance setting if set to a value greater than 0
            # Min: 0
            # Max: 2147483647
            I:"Night Interval"=0

            # If the Star Shower should only occur on full moon nights
            B:"On Full Moon"=false

            # The registry names of entities that should replace other entities during the event
            # Syntax: originalEntity;replacementEntity
            S:"Replacement Spawns" <
             >

            # The hex code of the Star Shower's sky color
            I:"Sky Color"=14598751

            # The amount of nights that should pass before Star Showers occurs for the first time
            # Min: 0
            # Max: 2147483647
            I:"Start Night"=0
        }

    }

    ##########################################################################################################
    # events_solar
    #--------------------------------------------------------------------------------------------------------#
    # Settings for solar events
    ##########################################################################################################

    events_solar {
        # The numeric IDs of the dimensions that solar events should occur in
        I:"Allowed Dimensions" <
            0
         >

        ##########################################################################################################
        # grim_eclipse
        #--------------------------------------------------------------------------------------------------------#
        # Grim Eclipse settings
        ##########################################################################################################

        grim_eclipse {
            # The chance in percent (1 = 100%) of the Grim Eclipse occurring
            # Min: 0.0
            # Max: 1.0
            D:Chance=0.05

            # The hex code of the Grim Eclipse's cloud color
            I:"Cloud Color"=1250065

            # The interval in days at which the Grim Eclipse should occur
            # Overrides chance setting if set to a value greater than 0
            # Min: 0
            # Max: 2147483647
            I:"Day Interval"=0

            # The registry names of hostile entities that should spawn exclusively on the surface during the event (whitelist)
            # Leave empty to allow all hostile entities to spawn
            S:"Exclusive Spawns" <
             >

            # The registry names of entities that should spawn additionally alongside other entities during the event
            # Syntax: originalEntity;extraEntity
            S:"Extra Spawns" <
                minecraft:zombie;nyx:eyezor
             >

            # The chance for an additional mob to be spawned when a mob spawns during the event
            # The higher the number, the less likely
            # Set to 0 to disable
            # Min: 0
            # Max: 1000
            I:"Extra Spawns Chance"=10

            # The amount of days that should pass until the Grim Eclipse happens again
            # Min: 0
            # Max: 2147483647
            I:"Grace Period"=8

            # The hex code of the Grim Eclipse's lightmap color
            I:"Lightmap Color"=1250065

            # The registry names of entities that should replace other entities during the event
            # Syntax: originalEntity;replacementEntity
            S:"Replacement Spawns" <
             >

            # The hex code of the Grim Eclipse's sky color
            I:"Sky Color"=460551

            # The amount of days that should pass before the Grim Eclipse occurs for the first time
            # Min: 0
            # Max: 2147483647
            I:"Start Day"=0
        }

        ##########################################################################################################
        # red_giant
        #--------------------------------------------------------------------------------------------------------#
        # Red Giant settings
        ##########################################################################################################

        red_giant {
            # The chance in percent (1 = 100%) of the Red Giant occurring
            # Min: 0.0
            # Max: 1.0
            D:Chance=0.05

            # The hex code of the Red Giant's cloud color
            I:"Cloud Color"=4328707

            # The interval in days at which the Red Giant should occur
            # Overrides chance setting if set to a value greater than 0
            # Min: 0
            # Max: 2147483647
            I:"Day Interval"=0

            # The registry names of hostile entities that should spawn exclusively on the surface during the event (whitelist)
            # Leave empty to allow all hostile entities to spawn
            S:"Exclusive Spawns" <
             >

            # The registry names of entities that should spawn additionally alongside other entities during the event
            # Syntax: originalEntity;extraEntity
            S:"Extra Spawns" <
                minecraft:zombie;nyx:eyezor
             >

            # The chance for an additional mob to be spawned when a mob spawns during the event
            # The higher the number, the less likely
            # Set to 0 to disable
            # Min: 0
            # Max: 1000
            I:"Extra Spawns Chance"=10

            # The amount of days that should pass until the Red Giant happens again
            # Min: 0
            # Max: 2147483647
            I:"Grace Period"=15

            # The hex code of the Red Giant's lightmap color
            I:"Lightmap Color"=4328707

            # The registry names of entities that should replace other entities during the event
            # Syntax: originalEntity;replacementEntity
            S:"Replacement Spawns" <
                minecraft:zombie;minecraft:husk
                minecraft:skeleton;minecraft:wither_skeleton
                minecraft:slime;minecraft:magma_cube
             >

            # The hex code of the Red Giant's sky color
            I:"Sky Color"=4328707

            # The amount of days that should pass before the Red Giant occurs for the first time
            # Min: 0
            # Max: 2147483647
            I:"Start Day"=0
        }

    }

    ##########################################################################################################
    # falling_stars
    #--------------------------------------------------------------------------------------------------------#
    # Settings for falling stars
    ##########################################################################################################

    falling_stars {
        # The volume for the falling star ambient sound
        D:"Ambient Volume"=8.0

        # The chance in percent (1 = 100%) for a falling star to appear at night for each player per second
        # Min: 0.0
        # Max: 1.0
        D:Chance=0.005

        # The chance for a falling star to appear during a star shower for each player per second
        # Min: 0.0
        # Max: 1.0
        D:"Chance During Showers"=0.05

        # The volume for the falling star impact sound
        D:"Impact Volume"=8.0
    }

    ##########################################################################################################
    # meteors
    #--------------------------------------------------------------------------------------------------------#
    # Settings for meteors
    ##########################################################################################################

    meteors {
        # The chance of a meteor spawning every second, during the day
        # Min: 0.0
        # Max: 1.7976931348623157E308
        D:Chance=7.0E-5

        # The chance of a meteor spawning every second, during the day, after the gate dimension has been entered once
        # Min: 0.0
        # Max: 1.7976931348623157E308
        D:"Chance After Gate Visit"=1.0E-4

        # The chance of a meteor spawning every second, during the night, after the gate dimension has been entered once
        # Min: 0.0
        # Max: 1.7976931348623157E308
        D:"Chance After Gate Visit At Night"=0.0015

        # The chance of a meteor spawning every second, during nighttime
        # Min: 0.0
        # Max: 1.7976931348623157E308
        D:"Chance At Night"=0.0012

        # The chance of a meteor spawning every second, during a star shower
        # Min: 0.0
        # Max: 1.7976931348623157E308
        D:"Chance During Star Showers"=0.0024

        # The chance of a meteor spawning every second, in the end dimension
        # Min: 0.0
        # Max: 1.7976931348623157E308
        D:"Chance In The End"=0.0015

        # If fallen meteors should be announced in chat on impact
        B:"Chat Message"=true

        # If chat messages for meteor impacts should include coordinates
        B:"Chat Message Verbose"=false

        # The radius in chunks that should be marked as invalid for meteor spawning around each player
        I:"Disallow Radius"=14

        # The amount of ticks that need to pass for each player until the chance of a meteor spawning in the area is halved (and then halved again, and so on)
        I:"Disallow Time"=12000

        # Subsidiary blocks that are spawned on impact of cold meteors
        S:"Filler Blocks: Frezarite" <
            minecraft:packed_ice
         >

        # Subsidiary blocks that are spawned on impact of hot meteors
        S:"Filler Blocks: Kreknorite" <
            minecraft:magma
         >

        # Subsidiary blocks that are spawned on impact of regular meteors
        S:"Filler Blocks: Meteorite" <
            minecraft:magma
         >

        # Subsidiary blocks that are spawned on impact of mixed meteors
        S:"Filler Blocks: Unknown" <
            minecraft:magma
            minecraft:packed_ice
         >

        # The dimension that needs to be entered to increase the spawning of meteors
        I:"Gate Dimension"=1

        # The amount of days that should pass after world creation until meteors can fall
        # Min: 0
        # Max: 2147483647
        I:"Grace Period"=0

        # Fluid blocks that are spawned on impact of cold meteors
        S:"Liquid Blocks: Frezarite" <
            minecraft:water
         >

        # Fluid blocks that are spawned on impact of hot meteors
        S:"Liquid Blocks: Kreknorite" <
            minecraft:lava
         >

        # Fluid blocks that are spawned on impact of regular meteors
        S:"Liquid Blocks: Meteorite" <
            minecraft:air
         >

        # Fluid blocks that are spawned on impact of mixed meteors
        S:"Liquid Blocks: Unknown" <
            minecraft:lava
            minecraft:water
         >

        # Main blocks that are spawned on impact of cold meteors
        S:"Meteor Blocks: Frezarite" <
            nyx:frezarite_rock
            minecraft:packed_ice
         >

        # Main blocks that are spawned on impact of hot meteors
        S:"Meteor Blocks: Kreknorite" <
            nyx:kreknorite_rock
            minecraft:obsidian
         >

        # Main blocks that are spawned on impact of regular meteors
        S:"Meteor Blocks: Meteorite" <
            nyx:meteorite_rock_hot
            nyx:meteorite_rock
         >

        # Main blocks that are spawned on impact of mixed meteors
        S:"Meteor Blocks: Unknown" <
            nyx:meteorite_rock_hot
            nyx:meteorite_rock
            nyx:frezarite_rock
            nyx:kreknorite_rock
            minecraft:packed_ice
            minecraft:obsidian
         >

        # The amount of blocks a meteor can spawn away from the nearest player
        I:"Spawn Radius"=1000
    }

    ##########################################################################################################
    # mod_integration
    #--------------------------------------------------------------------------------------------------------#
    # Settings for mod integration
    ##########################################################################################################

    mod_integration {
        # Enables Construct's Armory integration
        # Requires Tinkers' Construct integration to be enabled
        B:"Construct's Armory Integration"=true

        # Enables Game Stages integration
        # See wiki for details: https://github.com/Elite-Modding-Team/Hyxcate/wiki/Game-Stages
        B:"Game Stages Integration"=false

        # Enables Peaceful Surface integration
        # Mobs will spawn on the surface during events when enabled
        B:"Peaceful Surface Integration"=true

        # Enables Tinkers' Construct integration
        B:"Tinkers' Construct Integration"=true

        ##########################################################################################################
        # simple_difficulty
        #--------------------------------------------------------------------------------------------------------#
        # SimpleDifficulty settings
        ##########################################################################################################

        simple_difficulty {
            # Enables SimpleDifficulty integration
            B:"Enable SimpleDifficulty Integration"=true

            # The temperature level during an active Red Giant event
            I:"Red Giant Temperature"=10
        }

        ##########################################################################################################
        # tan
        #--------------------------------------------------------------------------------------------------------#
        # Tough As Nails settings
        ##########################################################################################################

        tan {
            # Enables Tough As Nails integration
            B:"Enable Tough As Nails Integration"=true

            # The temperature level during an active Red Giant event
            I:"Red Giant Temperature"=22
        }

    }

}


